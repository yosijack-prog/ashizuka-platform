<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Alcohol Search – おいしいお酒検索</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hiragino Sans','Yu Gothic',sans-serif;background:#faf5ff;color:#1e293b;min-height:100vh;display:flex;flex-direction:column}
header{background:#7e22ce;color:#fff;padding:16px 24px;display:flex;align-items:center;gap:16px}
.back{color:#d8b4fe;font-size:13px;text-decoration:none;margin-right:8px}.back:hover{color:#fff}
h1{font-size:20px;font-weight:700}.subtitle{font-size:12px;color:#d8b4fe;margin-top:2px}
.search-hero{background:linear-gradient(135deg,#7e22ce,#a855f7);padding:32px 24px;text-align:center}
.search-hero h2{color:#fff;font-size:22px;margin-bottom:20px}
.search-wrap{max-width:600px;margin:0 auto;position:relative}
.search-wrap input{width:100%;padding:14px 50px 14px 18px;border-radius:12px;border:none;font-size:16px;box-shadow:0 4px 20px rgba(0,0,0,.2)}
.search-wrap input:focus{outline:2px solid #c084fc}
.search-wrap .search-icon{position:absolute;right:16px;top:50%;transform:translateY(-50%);font-size:20px;pointer-events:none}
.genre-bar{background:#fff;border-bottom:1px solid #e9d5ff;padding:12px 24px;display:flex;gap:8px;overflow-x:auto;max-width:100%}
.genre-btn{display:flex;align-items:center;gap:6px;padding:7px 16px;border-radius:999px;border:1.5px solid #e9d5ff;font-size:14px;cursor:pointer;background:#faf5ff;white-space:nowrap;transition:all .15s;font-weight:500}
.genre-btn:hover,.genre-btn.active{background:#9333ea;color:#fff;border-color:#9333ea}
main{flex:1;max-width:1100px;width:100%;margin:0 auto;padding:24px}
.results-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;font-size:14px;color:#64748b}
.sort-sel{padding:6px 10px;border:1px solid #e9d5ff;border-radius:8px;font-size:13px;background:#fff}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px}
.card{background:#fff;border-radius:14px;padding:20px;border:1.5px solid #e9d5ff;transition:all .2s;cursor:pointer;position:relative}
.card:hover{border-color:#9333ea;box-shadow:0 8px 24px rgba(147,51,234,.12);transform:translateY(-3px)}
.card-genre{font-size:11px;font-weight:700;color:#9333ea;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
.card-name{font-size:16px;font-weight:700;margin-bottom:8px;line-height:1.3}
.card-unit{font-size:12px;color:#94a3b8;margin-bottom:12px}
.card-price{font-size:18px;font-weight:800;color:#7e22ce}
.card-price span{font-size:12px;font-weight:400;color:#94a3b8}
.card-stock{position:absolute;top:14px;right:14px;font-size:11px;padding:3px 8px;border-radius:999px}
.in-stock{background:#f0fdf4;color:#14532d}
.low-stock{background:#fef3c7;color:#92400e}
.out-stock{background:#fee2e2;color:#991b1b}
.detail-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;align-items:center;justify-content:center}
.detail-modal.open{display:flex}
.detail-box{background:#fff;border-radius:16px;padding:32px;max-width:440px;width:90%;position:relative}
.detail-close{position:absolute;top:14px;right:16px;font-size:24px;cursor:pointer;color:#94a3b8;border:none;background:none}
.detail-genre{font-size:13px;color:#9333ea;font-weight:700;margin-bottom:6px}
.detail-name{font-size:22px;font-weight:800;margin-bottom:16px}
.detail-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f1f5f9;font-size:14px}
.detail-row:last-child{border:none}
.detail-key{color:#64748b}
.detail-val{font-weight:600}
.api-err{background:#fee2e2;color:#991b1b;padding:12px 16px;border-radius:8px;margin-bottom:16px;font-size:14px;display:none}
</style>
</head>
<body>
<header>
  <a class="back" href="http://localhost:5172">← ポータル</a>
  <div><h1>🍶 Alcohol Search</h1><div class="subtitle">おいしいお酒検索システム</div></div>
</header>

<div class="search-hero">
  <h2>🔍 お酒を探す</h2>
  <div class="search-wrap">
    <input id="q" type="text" placeholder="商品名・ブランドで検索..." oninput="doSearch()">
    <span class="search-icon">🔍</span>
  </div>
</div>

<div class="genre-bar">
  <button class="genre-btn active" data-genre="" onclick="setGenre(this,'')">🍾 すべて</button>
  <button class="genre-btn" data-genre="ビール" onclick="setGenre(this,'ビール')">🍺 ビール</button>
  <button class="genre-btn" data-genre="日本酒" onclick="setGenre(this,'日本酒')">🍶 日本酒</button>
  <button class="genre-btn" data-genre="焼酎" onclick="setGenre(this,'焼酎')">🥃 焼酎</button>
  <button class="genre-btn" data-genre="ワイン" onclick="setGenre(this,'ワイン')">🍷 ワイン</button>
  <button class="genre-btn" data-genre="ガス" onclick="setGenre(this,'ガス')">💨 ガス</button>
</div>

<main>
  <div class="api-err" id="api-err">⚠️ APIサーバー（localhost:3001）に接続できません。バックエンドを起動してください。</div>
  <div class="results-header">
    <span id="result-count">読み込み中...</span>
    <select class="sort-sel" id="sort" onchange="renderGrid()">
      <option value="name">名前順</option>
      <option value="price-asc">価格 安い順</option>
      <option value="price-desc">価格 高い順</option>
      <option value="stock">在庫多い順</option>
    </select>
  </div>
  <div class="grid" id="grid"></div>
</main>

<!-- 詳細モーダル -->
<div class="detail-modal" id="modal" onclick="closeModal(event)">
  <div class="detail-box">
    <button class="detail-close" onclick="closeModal()">×</button>
    <div class="detail-genre" id="d-genre"></div>
    <div class="detail-name" id="d-name"></div>
    <div id="d-rows"></div>
  </div>
</div>

<script>
const API = 'http://localhost:3001';
let allProducts = [], filtered = [], selectedGenre = '';

async function init() {
  try {
    const res = await fetch(`${API}/api/products`);
    allProducts = (await res.json()).data || [];
    document.getElementById('api-err').style.display = 'none';
  } catch {
    document.getElementById('api-err').style.display = '';
    allProducts = [];
  }
  doSearch();
}

function setGenre(el, genre) {
  selectedGenre = genre;
  document.querySelectorAll('.genre-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  doSearch();
}

function doSearch() {
  const q = document.getElementById('q').value.toLowerCase();
  filtered = allProducts.filter(p =>
    (!selectedGenre || p.genre === selectedGenre) &&
    (!q || p.name.toLowerCase().includes(q) || (p.genre||'').toLowerCase().includes(q))
  );
  renderGrid();
}

function renderGrid() {
  const sort = document.getElementById('sort').value;
  const list = [...filtered].sort((a,b) => {
    if (sort === 'price-asc') return a.costPrice - b.costPrice;
    if (sort === 'price-desc') return b.costPrice - a.costPrice;
    if (sort === 'stock') return b.stock - a.stock;
    return a.name.localeCompare(b.name, 'ja');
  });
  document.getElementById('result-count').textContent = `${list.length} 件`;
  const grid = document.getElementById('grid');
  if (!list.length) { grid.innerHTML = '<div style="color:#94a3b8;padding:32px;grid-column:1/-1;text-align:center">該当する商品がありません</div>'; return; }
  grid.innerHTML = list.map(p => {
    const stockClass = p.stock > 10 ? 'in-stock' : p.stock > 0 ? 'low-stock' : 'out-stock';
    const stockLabel = p.stock > 10 ? '在庫あり' : p.stock > 0 ? `残${p.stock}` : '在庫なし';
    return `<div class="card" onclick="openModal('${p.id}')">
      <span class="card-stock ${stockClass}">${stockLabel}</span>
      <div class="card-genre">${p.genre}</div>
      <div class="card-name">${p.name}</div>
      <div class="card-unit">${p.unit}${p.caseSize ? ` / ケース${p.caseSize}本` : ''}</div>
      <div class="card-price">¥${(p.costPrice||0).toLocaleString()}<span> / ${p.unit}</span></div>
    </div>`;
  }).join('');
}

function openModal(id) {
  const p = allProducts.find(x => x.id === id);
  if (!p) return;
  document.getElementById('d-genre').textContent = p.genre;
  document.getElementById('d-name').textContent = p.name;
  document.getElementById('d-rows').innerHTML = [
    ['PLUコード', p.id],
    ['単位', p.unit],
    ['ケースサイズ', p.caseSize ? `${p.caseSize}本` : '-'],
    ['仕入原価', `¥${(p.costPrice||0).toLocaleString()}`],
    ['在庫', `${p.stock} ${p.unit}`],
  ].map(([k,v]) => `<div class="detail-row"><span class="detail-key">${k}</span><span class="detail-val">${v}</span></div>`).join('');
  document.getElementById('modal').classList.add('open');
}

function closeModal(e) {
  if (!e || e.target === document.getElementById('modal') || e.target.classList.contains('detail-close')) {
    document.getElementById('modal').classList.remove('open');
  }
}

init();
</script>
</body>
</html>
