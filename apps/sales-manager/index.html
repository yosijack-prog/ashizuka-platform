<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sales Manager – 芦塚酒店 経営管理</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hiragino Sans','Yu Gothic',sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}

/* ===== ログイン画面 ===== */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#1e293b,#0f172a)}
.login-box{background:#1e293b;border:1px solid #334155;border-radius:20px;padding:40px;width:380px;text-align:center}
.login-logo{font-size:36px;margin-bottom:8px}
.login-title{font-size:20px;font-weight:800;color:#f1f5f9;margin-bottom:4px}
.login-sub{font-size:13px;color:#64748b;margin-bottom:28px}
.role-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:24px}
.role-btn{padding:14px 8px;border-radius:12px;border:1.5px solid #334155;background:#0f172a;color:#94a3b8;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;text-align:center}
.role-btn:hover{border-color:#ea580c;color:#ea580c}
.role-btn.selected{border-color:#ea580c;background:rgba(234,88,12,.12);color:#fb923c}
.role-btn .role-icon{font-size:20px;display:block;margin-bottom:4px}
.pin-wrap{margin-bottom:20px}
.pin-label{font-size:13px;color:#64748b;margin-bottom:10px}
.pin-dots{display:flex;gap:10px;justify-content:center;margin-bottom:12px}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid #475569;background:transparent;transition:all .2s}
.pin-dot.filled{background:#ea580c;border-color:#ea580c}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.pin-key{padding:14px;border-radius:10px;border:1px solid #334155;background:#0f172a;color:#e2e8f0;font-size:18px;font-weight:700;cursor:pointer;transition:all .15s}
.pin-key:hover{background:#1e293b;border-color:#ea580c}
.pin-key:active{transform:scale(.95)}
.login-btn{width:100%;padding:14px;border-radius:12px;border:none;background:linear-gradient(90deg,#ea580c,#f97316);color:#fff;font-size:16px;font-weight:700;cursor:pointer;margin-top:4px}
.login-btn:hover{opacity:.9}
.login-err{color:#f87171;font-size:13px;margin-top:8px;min-height:20px}

/* ===== メイン画面 ===== */
#app-screen{display:none;min-height:100vh;flex-direction:column}
.app-header{background:#1e293b;border-bottom:1px solid #334155;padding:12px 24px;display:flex;align-items:center;gap:16px}
.app-header-logo{font-size:22px;font-weight:800;color:#f1f5f9;flex:1}
.app-header-role{font-size:12px;background:rgba(234,88,12,.15);color:#fb923c;padding:4px 10px;border-radius:999px;font-weight:700}
.app-header-user{font-size:14px;color:#94a3b8}
.logout-btn{padding:6px 14px;border-radius:8px;border:1px solid #475569;background:transparent;color:#94a3b8;font-size:12px;cursor:pointer}
.logout-btn:hover{border-color:#ea580c;color:#ea580c}

.app-body{display:flex;flex:1}
.sidebar{width:200px;background:#1e293b;border-right:1px solid #334155;padding:16px 0;flex-shrink:0}
.nav-item{display:flex;align-items:center;gap:10px;padding:11px 20px;font-size:14px;color:#94a3b8;cursor:pointer;transition:all .15s}
.nav-item:hover{background:rgba(234,88,12,.08);color:#fb923c}
.nav-item.active{background:rgba(234,88,12,.12);color:#fb923c;border-right:3px solid #ea580c}
.nav-item .ni{font-size:16px}
.nav-sep{height:1px;background:#334155;margin:10px 16px}

.content{flex:1;padding:24px;overflow-y:auto}
.page{display:none}.page.active{display:block}

/* ===== KPIカード ===== */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.kpi-card{background:#1e293b;border:1px solid #334155;border-radius:14px;padding:18px}
.kpi-label{font-size:12px;color:#64748b;margin-bottom:6px}
.kpi-value{font-size:28px;font-weight:800;color:#f1f5f9;line-height:1}
.kpi-sub{font-size:12px;margin-top:4px}
.kpi-up{color:#4ade80}.kpi-down{color:#f87171}.kpi-neu{color:#94a3b8}
.kpi-card.highlight{border-color:#ea580c;background:rgba(234,88,12,.06)}

/* ===== セクションタイトル ===== */
.sec-title{font-size:16px;font-weight:700;color:#f1f5f9;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.sec-title::before{content:'';width:4px;height:18px;background:#ea580c;border-radius:2px;display:inline-block}

/* ===== テーブル ===== */
.data-table{width:100%;border-collapse:collapse;background:#1e293b;border-radius:12px;overflow:hidden}
.data-table th{background:#0f172a;padding:11px 14px;font-size:12px;color:#64748b;font-weight:700;text-align:left;border-bottom:1px solid #334155}
.data-table td{padding:11px 14px;font-size:13px;border-bottom:1px solid #1e293b;color:#e2e8f0}
.data-table tr:last-child td{border-bottom:none}
.data-table tr:hover td{background:rgba(234,88,12,.04)}
.data-table-wrap{background:#1e293b;border:1px solid #334155;border-radius:14px;overflow:hidden;margin-bottom:24px}

/* ===== スコアバー ===== */
.sbar-wrap{display:flex;align-items:center;gap:8px}
.sbar{flex:1;height:6px;background:#0f172a;border-radius:3px;position:relative;overflow:visible}
.sbar-fill{height:100%;border-radius:3px;transition:width .6s}
.sbar-mark{position:absolute;top:-4px;width:2px;height:14px;background:#475569;border-radius:1px}
.sbar-num{font-size:13px;font-weight:700;min-width:32px;text-align:right}
.score-over{color:#f59e0b}.score-ok{color:#4ade80}.score-low{color:#f87171}

/* ===== 評価カード ===== */
.eval-card{background:#1e293b;border:1px solid #334155;border-radius:14px;padding:20px;margin-bottom:14px;cursor:pointer;transition:border-color .2s}
.eval-card:hover{border-color:#ea580c}
.eval-card-header{display:flex;align-items:center;gap:12px}
.eval-avatar{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:#fff;flex-shrink:0}
.eval-name{font-size:15px;font-weight:700;color:#f1f5f9}
.eval-role-tag{font-size:11px;padding:2px 8px;border-radius:999px;font-weight:600}
.eval-score-big{font-size:32px;font-weight:900;margin-left:auto}
.eval-detail{margin-top:16px;display:none}
.eval-card.open .eval-detail{display:block}
.eval-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;font-size:13px}
.eval-row-label{width:140px;color:#64748b;flex-shrink:0;font-size:12px}
.bonus-badge{padding:2px 8px;border-radius:999px;font-size:11px;font-weight:700;background:#065f46;color:#4ade80;margin-left:8px}
.approve-btn{padding:8px 18px;border-radius:8px;border:none;background:#ea580c;color:#fff;font-size:13px;font-weight:700;cursor:pointer;margin-top:12px}
.approve-btn:hover{opacity:.85}
.approved-badge{display:inline-block;padding:4px 12px;border-radius:999px;background:#065f46;color:#4ade80;font-size:12px;font-weight:700;margin-top:12px}

/* ===== グラフ簡易バー ===== */
.chart-wrap{background:#1e293b;border:1px solid #334155;border-radius:14px;padding:20px;margin-bottom:24px}
.chart-bar-group{display:flex;align-items:flex-end;gap:8px;height:120px;padding-bottom:8px;border-bottom:1px solid #334155}
.chart-bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.chart-bar-inner{width:100%;background:linear-gradient(180deg,#f97316,#ea580c);border-radius:4px 4px 0 0;transition:height .6s;min-height:4px}
.chart-bar-label{font-size:10px;color:#64748b;margin-top:4px}
.chart-bar-val{font-size:10px;color:#fb923c;font-weight:700}

/* ===== 自分の評価画面 ===== */
.my-eval-hero{background:linear-gradient(135deg,#1e293b,#0f172a);border:1px solid #334155;border-radius:16px;padding:28px;margin-bottom:24px;text-align:center}
.my-eval-score{font-size:64px;font-weight:900;line-height:1}
.my-eval-label{font-size:14px;color:#64748b;margin-top:4px}
.my-eval-bonus{font-size:18px;font-weight:700;margin-top:8px}

/* ===== 承認待ちバッジ ===== */
.pending-badge{display:inline-block;padding:2px 8px;border-radius:999px;background:#7c2d12;color:#fed7aa;font-size:11px;font-weight:700;margin-left:6px}

/* ===== コメント欄 ===== */
.comment-box{width:100%;background:#0f172a;border:1px solid #334155;border-radius:8px;padding:10px 12px;color:#e2e8f0;font-size:13px;resize:vertical;min-height:60px;margin-top:8px}
.comment-box:focus{outline:none;border-color:#ea580c}
.save-btn{padding:7px 16px;border-radius:8px;border:none;background:#334155;color:#e2e8f0;font-size:13px;cursor:pointer;margin-top:6px}
.save-btn:hover{background:#475569}
</style>
</head>
<body>

<!-- ===== ログイン画面 ===== -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">🍶</div>
    <div class="login-title">芦塚酒店</div>
    <div class="login-sub">Sales Manager へようこそ</div>

    <div class="role-grid" id="role-grid">
      <div class="role-btn" onclick="selectRole('president')" data-role="president"><span class="role-icon">👑</span>社長</div>
      <div class="role-btn" onclick="selectRole('manager')" data-role="manager"><span class="role-icon">🏪</span>店長</div>
      <div class="role-btn" onclick="selectRole('driver')" data-role="driver"><span class="role-icon">🚚</span>配送</div>
      <div class="role-btn" onclick="selectRole('sales')" data-role="sales"><span class="role-icon">📋</span>販売管理</div>
      <div class="role-btn" onclick="selectRole('accounting')" data-role="accounting"><span class="role-icon">💰</span>会計管理</div>
      <div class="role-btn" onclick="selectRole('store')" data-role="store"><span class="role-icon">🏬</span>店舗管理</div>
    </div>

    <div class="pin-wrap" id="pin-wrap" style="display:none">
      <div class="pin-label" id="pin-label">PINを入力してください</div>
      <div class="pin-dots" id="pin-dots">
        <div class="pin-dot" id="d0"></div>
        <div class="pin-dot" id="d1"></div>
        <div class="pin-dot" id="d2"></div>
        <div class="pin-dot" id="d3"></div>
      </div>
      <div class="pin-pad">
        <div class="pin-key" onclick="pinInput('1')">1</div>
        <div class="pin-key" onclick="pinInput('2')">2</div>
        <div class="pin-key" onclick="pinInput('3')">3</div>
        <div class="pin-key" onclick="pinInput('4')">4</div>
        <div class="pin-key" onclick="pinInput('5')">5</div>
        <div class="pin-key" onclick="pinInput('6')">6</div>
        <div class="pin-key" onclick="pinInput('7')">7</div>
        <div class="pin-key" onclick="pinInput('8')">8</div>
        <div class="pin-key" onclick="pinInput('9')">9</div>
        <div class="pin-key" onclick="pinClear()" style="font-size:13px">戻す</div>
        <div class="pin-key" onclick="pinInput('0')">0</div>
        <div class="pin-key" onclick="pinReset()" style="font-size:12px;color:#f87171">消去</div>
      </div>
      <div class="login-err" id="login-err"></div>
    </div>
  </div>
</div>

<!-- ===== メイン画面 ===== -->
<div id="app-screen" style="display:none;flex-direction:column;min-height:100vh">
  <div class="app-header">
    <div class="app-header-logo">📊 Sales Manager</div>
    <div class="app-header-user" id="header-user"></div>
    <div class="app-header-role" id="header-role"></div>
    <button class="logout-btn" onclick="logout()">ログアウト</button>
  </div>
  <div class="app-body">
    <div class="sidebar" id="sidebar"></div>
    <div class="content" id="content"></div>
  </div>
</div>

<script>
// ===== 設定 =====
const API = 'http://localhost:3001';

// PINマスタ（変更可能）
const PINS = {
  president:  '1234',
  manager:    '5678',
  driver:     '1111',
  sales:      '2222',
  accounting: '3333',
  store:      '4444',
};

const ROLE_NAMES = {
  president:'社長', manager:'店長', driver:'配送',
  sales:'販売管理', accounting:'会計管理', store:'店舗管理',
};

// ===== 状態 =====
let currentRole = null;
let pinBuffer = '';
let employees = [];
let approvals = {}; // taskId → {managerComment, presidentApproved}

// ===== PIN ログイン =====
function selectRole(role) {
  currentRole = role;
  document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('selected'));
  document.querySelector(`[data-role="${role}"]`).classList.add('selected');
  document.getElementById('pin-wrap').style.display = '';
  document.getElementById('pin-label').textContent = `${ROLE_NAMES[role]} のPINを入力`;
  pinReset();
}

function pinInput(digit) {
  if (pinBuffer.length >= 4) return;
  pinBuffer += digit;
  updatePinDots();
  if (pinBuffer.length === 4) setTimeout(checkPin, 150);
}

function pinClear() {
  pinBuffer = pinBuffer.slice(0, -1);
  updatePinDots();
}

function pinReset() {
  pinBuffer = '';
  updatePinDots();
  document.getElementById('login-err').textContent = '';
}

function updatePinDots() {
  for (let i = 0; i < 4; i++) {
    document.getElementById(`d${i}`).classList.toggle('filled', i < pinBuffer.length);
  }
}

function checkPin() {
  if (pinBuffer === PINS[currentRole]) {
    loginSuccess();
  } else {
    document.getElementById('login-err').textContent = 'PINが違います。もう一度入力してください。';
    pinReset();
  }
}

function loginSuccess() {
  document.getElementById('login-screen').style.display = 'none';
  const app = document.getElementById('app-screen');
  app.style.display = 'flex';
  document.getElementById('header-role').textContent = ROLE_NAMES[currentRole];
  document.getElementById('header-user').textContent = getRolePerson(currentRole);
  buildSidebar();
  loadData();
}

function getRolePerson(role) {
  const map = {president:'芦塚 義幸', manager:'店長', driver:'', sales:'酒井 さやか', accounting:'会計担当', store:'店舗担当'};
  return map[role] || '';
}

function logout() {
  currentRole = null;
  pinBuffer = '';
  document.getElementById('app-screen').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('selected'));
  document.getElementById('pin-wrap').style.display = 'none';
}

// ===== サイドバー構築 =====
const NAV_CONFIG = {
  president: [
    {id:'dashboard', icon:'📈', label:'ダッシュボード'},
    {id:'ranking',   icon:'🏆', label:'ランキング'},
    {id:'evaluations', icon:'⭐', label:'評価承認'},
    {id:'delivery',  icon:'🚚', label:'配送実績'},
    {id:'store',     icon:'🏬', label:'店舗実績'},
    {id:'orders',    icon:'📋', label:'発注サマリー'},
    {id:'employees', icon:'👥', label:'社員管理'},
  ],
  manager: [
    {id:'dashboard', icon:'📈', label:'ダッシュボード'},
    {id:'ranking',   icon:'🏆', label:'ランキング'},
    {id:'evaluations', icon:'⭐', label:'評価レビュー'},
    {id:'delivery',  icon:'🚚', label:'配送実績'},
    {id:'store',     icon:'🏬', label:'店舗実績'},
    {id:'orders',    icon:'📋', label:'発注サマリー'},
  ],
  driver:     [{id:'myeval', icon:'⭐', label:'自分の評価'}, {id:'mydelivery', icon:'🚚', label:'自分の実績'}],
  sales:      [{id:'myeval', icon:'⭐', label:'自分の評価'}, {id:'saleswork',  icon:'📋', label:'業務状況'}],
  accounting: [{id:'myeval', icon:'⭐', label:'自分の評価'}, {id:'accwork',   icon:'💰', label:'業務状況'}],
  store:      [{id:'myeval', icon:'⭐', label:'自分の評価'}, {id:'storework', icon:'🏬', label:'業務状況'}],
};

function buildSidebar() {
  const items = NAV_CONFIG[currentRole] || [];
  document.getElementById('sidebar').innerHTML = items.map((n,i) =>
    `<div class="nav-item${i===0?' active':''}" onclick="showPage('${n.id}',this)">
       <span class="ni">${n.icon}</span>${n.label}
       ${n.id==='evaluations' && getPendingCount()>0 ? `<span class="pending-badge">${getPendingCount()}</span>` : ''}
     </div>`
  ).join('') + '<div class="nav-sep"></div>';
  showPage(items[0].id, document.querySelector('.nav-item'));
}

function getPendingCount() {
  return MOCK_EVALS['2026-Q1'].filter(e => !approvals[e.id]?.presidentApproved).length;
}

function showPage(pageId, el) {
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  if (el) el.classList.add('active');
  renderPage(pageId);
}

// ===== データ読み込み =====
async function loadData() {
  try {
    const res = await fetch(`${API}/api/employees`);
    employees = (await res.json()).data || [];
  } catch {
    employees = MOCK_EVALS['2026-Q1'].map(e => ({
      id:e.id, name:e.name, color:e.color, avatar:e.avatar,
      role: e.role==='配送'?'driver':e.role==='営業'?'sales':e.role==='管理職'?'manager':'driver'
    }));
  }
}

// ===== ページレンダリング =====
function renderPage(pageId) {
  const c = document.getElementById('content');
  switch(pageId) {
    case 'dashboard':   c.innerHTML = renderDashboard(); break;
    case 'ranking':     c.innerHTML = renderRanking(); break;
    case 'evaluations': c.innerHTML = renderEvaluations(); break;
    case 'delivery':    c.innerHTML = renderDelivery(); break;
    case 'store':       c.innerHTML = renderStoreStats(); break;
    case 'orders':      c.innerHTML = renderOrders(); break;
    case 'employees':   c.innerHTML = renderEmployees(); break;
    case 'myeval':      c.innerHTML = renderMyEval(); break;
    case 'mydelivery':  c.innerHTML = renderMyDelivery(); break;
    case 'saleswork':   c.innerHTML = renderSalesWork(); break;
    case 'accwork':     c.innerHTML = renderAccWork(); break;
    case 'storework':   c.innerHTML = renderStoreWork(); break;
    default:            c.innerHTML = '<p style="color:#64748b;padding:40px">準備中</p>';
  }
}

// ===== モックデータ =====
const MOCK_EVALS = {
  '2026-Q1': [
    { id:'emp_tan', name:'谷口 亮介',   role:'配送', color:'#3b82f6', avatar:'谷', total:118, newProductCount:9,  newProductTarget:7,  newProductScore:129, avgGrossMargin:32, marginTarget:28, marginScore:114, settlementRate:78, settlementTarget:70, settlementScore:111, prevScore:110 },
    { id:'emp_oku', name:'奥田 玲晃',   role:'配送', color:'#22c55e', avatar:'奥', total:103, newProductCount:7,  newProductTarget:7,  newProductScore:100, avgGrossMargin:30, marginTarget:28, marginScore:107, settlementRate:71, settlementTarget:70, settlementScore:101, prevScore:95  },
    { id:'emp_abi', name:'阿比留 徹',   role:'配送', color:'#f59e0b', avatar:'阿', total:99,  newProductCount:6,  newProductTarget:7,  newProductScore:86,  avgGrossMargin:29, marginTarget:28, marginScore:104, settlementRate:75, settlementTarget:70, settlementScore:107, prevScore:92  },
    { id:'emp_aka', name:'赤川 秀敏',   role:'配送', color:'#ef4444', avatar:'赤', total:80,  newProductCount:4,  newProductTarget:7,  newProductScore:57,  avgGrossMargin:27, marginTarget:28, marginScore:96,  settlementRate:60, settlementTarget:70, settlementScore:86,  prevScore:75  },
    { id:'emp_ima', name:'今村 淳子',   role:'配送', color:'#a855f7', avatar:'今', total:74,  newProductCount:3,  newProductTarget:6,  newProductScore:50,  avgGrossMargin:26, marginTarget:28, marginScore:93,  settlementRate:55, settlementTarget:70, settlementScore:79,  prevScore:70  },
    { id:'emp_kaw', name:'川原 未香',   role:'配送', color:'#ec4899', avatar:'川', total:64,  newProductCount:2,  newProductTarget:6,  newProductScore:33,  avgGrossMargin:25, marginTarget:28, marginScore:89,  settlementRate:50, settlementTarget:70, settlementScore:71,  prevScore:60  },
    { id:'emp_ash', name:'芦塚 義幸',   role:'管理職',color:'#06b6d4', avatar:'芦', total:61, newProductCount:2,  newProductTarget:6,  newProductScore:33,  avgGrossMargin:24, marginTarget:28, marginScore:86,  settlementRate:45, settlementTarget:70, settlementScore:64,  prevScore:55  },
    { id:'emp_sak', name:'酒井 さやか', role:'販売管理',color:'#84cc16',avatar:'酒', total:53, newProductCount:1, newProductTarget:5,  newProductScore:20,  avgGrossMargin:23, marginTarget:28, marginScore:82,  settlementRate:40, settlementTarget:70, settlementScore:57,  prevScore:50  },
  ],
};

const MOCK_DELIVERY = [
  { id:'emp_tan', name:'谷口 亮介', color:'#3b82f6', avatar:'谷', deliveries:142, containers:38, containerTarget:45, sales:4280000, salesTarget:4000000, margin:32, newProducts:9, claims:0, absent:0, late:0 },
  { id:'emp_oku', name:'奥田 玲晃', color:'#22c55e', avatar:'奥', deliveries:135, containers:35, containerTarget:40, sales:3950000, salesTarget:4000000, margin:30, newProducts:7, claims:1, absent:0, late:1 },

function bonusLabel(score) {
  if (score>=120) return '×1.30';
  if (score>=110) return '×1.20';
  if (score>=100) return '×1.10';
  if (score>=85)  return '×1.05';
  return '×1.00';
}

const BAR_MAX = 130;
function scoreBar(score, width) {
  const pct     = Math.min(score, BAR_MAX) / BAR_MAX * 100;
  const markPct = (100 / BAR_MAX * 100).toFixed(1);
  const fill    = score>=100 ? 'linear-gradient(90deg,#f59e0b,#fbbf24)' : 'linear-gradient(90deg,#f97316,#ea580c)';
  const cls     = score>=100 ? 'score-over' : score>=85 ? 'score-ok' : 'score-low';
  return `<div class="sbar-wrap"${width?` style="width:${width}"`:''}><div class="sbar"><div class="sbar-fill" style="width:${pct.toFixed(1)}%;background:${fill}"></div><div class="sbar-mark" style="left:${markPct}%"></div></div><span class="sbar-num ${cls}">${score}</span></div>`;
}
