<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sales Manager – 芦塚酒店</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* === Design Tokens === */
:root{
  --bg:#060c17;--sf:#0d1525;--sf2:#142035;--sf3:#1b2a46;
  --bd:#1e2e48;--bd2:#2a3e5e;
  --tx:#e6f0fa;--tx2:#7a92a8;--tx3:#384d64;
  --ac:#f97316;--ac-bg:rgba(249,115,22,.10);--ac-bd:rgba(249,115,22,.25);
  --gn:#10d9a0;--gn-bg:rgba(16,217,160,.08);
  --am:#f5a623;--am-bg:rgba(245,166,35,.08);
  --rd:#f54e6e;--rd-bg:rgba(245,78,110,.08);
  --bl:#4da6ff;--bl-bg:rgba(77,166,255,.08);
  --gd:#fbbf24;
  --r:10px;--rs:6px;--rl:14px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter','Hiragino Sans','Yu Gothic',system-ui,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;font-size:13px;line-height:1.5;-webkit-font-smoothing:antialiased}

/* ===== LOGIN ===== */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;
  background:radial-gradient(ellipse 70% 50% at 50% 0%,rgba(249,115,22,.07) 0%,transparent 65%),
             linear-gradient(160deg,#0d1525 0%,#060c17 100%)}
.login-box{background:rgba(13,21,37,.92);backdrop-filter:blur(20px);border:1px solid var(--bd);border-radius:var(--rl);padding:40px 36px;width:420px;text-align:center;box-shadow:0 8px 48px rgba(0,0,0,.6)}
.login-mark{width:52px;height:52px;background:linear-gradient(135deg,#f97316,#ea580c);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 14px;box-shadow:0 4px 24px rgba(249,115,22,.35)}
.login-title{font-size:22px;font-weight:800;color:var(--tx);letter-spacing:-.02em;margin-bottom:3px}
.login-sub{font-size:12px;color:var(--tx2);margin-bottom:28px;font-weight:500}
.role-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:24px}
.role-btn{padding:13px 6px 10px;border-radius:var(--r);border:1px solid var(--bd);background:var(--sf);color:var(--tx2);font-size:11px;font-weight:600;cursor:pointer;transition:all .18s;font-family:inherit}
.role-btn:hover{border-color:var(--ac-bd);color:var(--ac);background:var(--ac-bg)}
.role-btn.selected{border-color:var(--ac);background:var(--ac-bg);color:#fb923c;box-shadow:0 0 0 1px rgba(249,115,22,.18)}
.role-btn .role-icon{font-size:22px;display:block;margin-bottom:5px}
.pin-wrap{margin-bottom:12px}
.pin-label{font-size:12px;color:var(--tx2);margin-bottom:14px;font-weight:500}
.pin-dots{display:flex;gap:10px;justify-content:center;margin-bottom:16px}
.pin-dot{width:12px;height:12px;border-radius:50%;border:2px solid var(--bd2);background:transparent;transition:all .15s}
.pin-dot.filled{background:var(--ac);border-color:var(--ac);box-shadow:0 0 10px rgba(249,115,22,.5)}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
.pin-key{padding:14px 6px;border-radius:var(--rs);border:1px solid var(--bd);background:var(--sf);color:var(--tx);font-size:18px;font-weight:700;cursor:pointer;transition:all .12s;user-select:none;font-family:inherit}
.pin-key:hover{background:var(--sf2);border-color:var(--bd2)}
.pin-key:active{transform:scale(.94);background:var(--sf3)}
.login-err{color:#f87171;font-size:12px;margin-top:10px;min-height:18px;font-weight:500}

/* ===== APP SHELL ===== */
#app-screen{display:none;flex-direction:column;min-height:100vh}
.app-header{background:var(--sf);border-bottom:1px solid var(--bd);padding:0 20px;height:50px;display:flex;align-items:center;position:sticky;top:0;z-index:100;flex-shrink:0}
.hbrand{display:flex;align-items:center;gap:9px;flex-shrink:0;padding-right:18px}
.hbrand-mark{width:30px;height:30px;background:linear-gradient(135deg,#f97316,#ea580c);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.hbrand-text{font-size:14px;font-weight:800;color:var(--tx);letter-spacing:-.02em;white-space:nowrap}
.hdiv{width:1px;height:26px;background:var(--bd);flex-shrink:0;margin:0 4px}
.hkpi-bar{display:flex;align-items:stretch;flex:1;overflow:hidden}
.hkpi{display:flex;flex-direction:column;justify-content:center;padding:0 14px;border-right:1px solid var(--bd)}
.hkpi-v{font-size:15px;font-weight:800;line-height:1.1;color:var(--tx)}
.hkpi-l{font-size:10px;color:var(--tx2);margin-top:1px;white-space:nowrap;font-weight:500}
.hright{display:flex;align-items:center;gap:8px;margin-left:auto;flex-shrink:0}
.role-tag{font-size:11px;background:var(--ac-bg);color:#fb923c;border:1px solid var(--ac-bd);padding:3px 10px;border-radius:999px;font-weight:600}
.user-name{font-size:12px;color:var(--tx2);font-weight:500}
.logout-btn{padding:5px 12px;border-radius:var(--rs);border:1px solid var(--bd);background:transparent;color:var(--tx2);font-size:11px;font-weight:500;cursor:pointer;transition:all .15s;font-family:inherit}
.logout-btn:hover{border-color:var(--rd);color:var(--rd)}

/* ===== LAYOUT ===== */
.app-body{display:flex;flex:1;height:calc(100vh - 50px)}
.sidebar{width:200px;background:var(--sf);border-right:1px solid var(--bd);padding:8px 0 20px;flex-shrink:0;overflow-y:auto}
.nav-section{font-size:10px;color:var(--tx3);padding:12px 16px 4px;text-transform:uppercase;letter-spacing:.07em;font-weight:700}
.nav-item{display:flex;align-items:center;gap:8px;padding:8px 14px 8px 16px;font-size:13px;font-weight:500;color:var(--tx2);cursor:pointer;transition:all .12s;position:relative;white-space:nowrap}
.nav-item:hover{background:rgba(249,115,22,.06);color:var(--tx)}
.nav-item.active{background:var(--ac-bg);color:var(--ac);font-weight:600}
.nav-item.active::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--ac);border-radius:0 2px 2px 0}
.ni{font-size:14px;flex-shrink:0}
.nav-sep{height:1px;background:var(--bd);margin:8px 16px}
.content{flex:1;overflow-y:auto;padding:20px}

/* ===== PAGE HEADER ===== */
.page-hd{display:flex;align-items:baseline;gap:10px;margin-bottom:18px}
.page-hd h2{font-size:18px;font-weight:800;color:var(--tx);letter-spacing:-.02em}
.page-hd span{font-size:12px;color:var(--tx2);font-weight:500}

/* ===== GRID ===== */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.g6{display:grid;grid-template-columns:repeat(6,1fr);gap:12px}
.span2{grid-column:span 2}.span3{grid-column:span 3}

/* ===== KPI CARDS ===== */
.kpi{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:14px 16px 14px 19px;position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--bd2);border-radius:0 2px 2px 0}
.kpi.accent::before{background:var(--ac)}.kpi.green::before{background:var(--gn)}
.kpi.red::before{background:var(--rd)}.kpi.amber::before{background:var(--am)}
.kpi.accent{border-color:rgba(249,115,22,.18);background:rgba(249,115,22,.04)}
.kpi.green{border-color:rgba(16,217,160,.18);background:rgba(16,217,160,.04)}
.kpi.red{border-color:rgba(245,78,110,.18);background:rgba(245,78,110,.04)}
.kpi.amber{border-color:rgba(245,166,35,.18);background:rgba(245,166,35,.04)}
.kpi-l{font-size:11px;color:var(--tx2);margin-bottom:6px;display:flex;align-items:center;gap:4px;font-weight:500}
.kpi-v{font-size:26px;font-weight:800;line-height:1;color:var(--tx);letter-spacing:-.02em}
.kpi-v.sm{font-size:21px}.kpi-v.lg{font-size:34px}
.kpi-sub{font-size:11px;margin-top:5px;color:var(--tx2)}
.up{color:var(--gn)!important}.down{color:var(--rd)!important}.warn{color:var(--am)!important}.gold{color:var(--gd)!important}.ok{color:var(--gn)!important}

/* ===== PANELS ===== */
.panel{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);margin-bottom:14px;overflow:hidden}
.panel-head{padding:10px 16px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;background:rgba(0,0,0,.12)}
.panel-title{font-size:13px;font-weight:700;color:var(--tx);display:flex;align-items:center;gap:8px;letter-spacing:-.01em}
.panel-title::before{content:'';width:3px;height:14px;background:var(--ac);border-radius:2px;display:inline-block;flex-shrink:0}
.panel-body{padding:14px 16px}
.panel-sub{font-size:11px;color:var(--tx2);font-weight:500}

/* ===== TABLE ===== */
.tbl{width:100%;border-collapse:collapse}
.tbl th{background:rgba(0,0,0,.18);padding:7px 10px;font-size:10px;color:var(--tx2);font-weight:700;text-align:left;border-bottom:1px solid var(--bd);white-space:nowrap;letter-spacing:.04em;text-transform:uppercase}
.tbl td{padding:9px 10px;font-size:12px;border-bottom:1px solid rgba(30,46,72,.7);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:rgba(249,115,22,.025)}
.tbl td.num{text-align:right;font-weight:600;font-variant-numeric:tabular-nums}
.tbl th.num{text-align:right}
.tbl-total td{border-top:2px solid var(--bd);font-weight:700;background:rgba(0,0,0,.15)!important}

/* ===== SCORE BAR ===== */
.sbar-wrap{display:flex;align-items:center;gap:7px}
.sbar{flex:1;height:6px;background:var(--bg);border-radius:3px;position:relative;min-width:60px}
.sbar-fill{height:100%;border-radius:3px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.sbar-mark{position:absolute;top:-4px;width:2px;height:14px;background:var(--bd2);border-radius:1px}
.snum{font-size:12px;font-weight:700;min-width:30px;text-align:right}
.over{color:var(--gd)!important}.mid{color:var(--am)!important}.low{color:var(--rd)!important}

/* ===== CHARTS ===== */
.bar-chart{display:flex;align-items:flex-end;gap:8px;height:120px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.bar-inner{width:100%;border-radius:4px 4px 0 0;min-height:3px;transition:height .5s ease}
.bar-lbl{font-size:10px;color:var(--tx2);font-weight:500}
.bar-val{font-size:10px;font-weight:700}
.chart-axis{border-top:1px solid var(--bd);margin-top:4px}
.chart-foot{display:flex;justify-content:space-between;font-size:10px;color:var(--tx2);margin-top:7px;padding:0 2px}

/* ===== BADGES ===== */
.badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:5px;font-size:11px;font-weight:600;line-height:1.4}
.badge-green{background:rgba(16,217,160,.10);color:#10d9a0;border:1px solid rgba(16,217,160,.22)}
.badge-amber{background:rgba(251,191,36,.10);color:#fbbf24;border:1px solid rgba(251,191,36,.22)}
.badge-red{background:rgba(245,78,110,.10);color:#f54e6e;border:1px solid rgba(245,78,110,.22)}
.badge-blue{background:rgba(77,166,255,.10);color:#4da6ff;border:1px solid rgba(77,166,255,.22)}
.badge-orange{background:rgba(249,115,22,.10);color:#fb923c;border:1px solid rgba(249,115,22,.22)}
.badge-pending{background:rgba(249,115,22,.15);color:#fed7aa;border:1px solid rgba(249,115,22,.28);margin-left:auto;font-size:10px;padding:1px 6px}

/* ===== AVATAR ===== */
.av{border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-weight:700;color:#fff;flex-shrink:0}
.av-sm{width:24px;height:24px;font-size:10px}
.av-md{width:32px;height:32px;font-size:13px}
.av-lg{width:42px;height:42px;font-size:17px}

/* ===== EVAL CARD ===== */
.eval-card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);margin-bottom:8px;transition:border-color .15s}
.eval-card:hover{border-color:var(--bd2)}
.eval-head{padding:14px 16px;display:flex;align-items:center;gap:10px;cursor:pointer}
.eval-head:hover{background:rgba(249,115,22,.03)}
.eval-body{padding:0 16px 14px;display:none}
.eval-card.open .eval-body{display:block}
.comment-box{width:100%;background:var(--bg);border:1px solid var(--bd);border-radius:var(--rs);padding:8px 10px;color:var(--tx);font-size:12px;resize:vertical;min-height:52px;margin-top:6px;font-family:inherit;transition:border-color .15s}
.comment-box:focus{outline:none;border-color:var(--ac)}
.btn{padding:6px 14px;border-radius:var(--rs);border:none;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s}
.btn-approve{background:var(--ac);color:#fff}.btn-approve:hover{opacity:.85}
.btn-save{background:var(--sf2);color:var(--tx);border:1px solid var(--bd)}.btn-save:hover{background:var(--sf3)}
.approved-tag{display:inline-flex;align-items:center;gap:4px;padding:4px 12px;border-radius:5px;background:rgba(16,217,160,.08);color:var(--gn);border:1px solid rgba(16,217,160,.22);font-size:12px;font-weight:600}

/* ===== MY HERO ===== */
.my-hero{background:linear-gradient(135deg,rgba(249,115,22,.08) 0%,rgba(6,12,23,0) 65%);border:1px solid rgba(249,115,22,.22);border-radius:var(--r);padding:28px;text-align:center;margin-bottom:14px}
.divider{height:1px;background:var(--bd);margin:12px 0}

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px}
::-webkit-scrollbar-thumb:hover{background:var(--tx3)}
</style>
</head>
<body>

<!-- ===== LOGIN ===== -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-mark">🍶</div>
    <div class="login-title">芦塚酒店</div>
    <div class="login-sub">Sales Manager · 経営管理システム</div>
    <div class="role-grid" id="role-grid">
      <div class="role-btn" onclick="selectRole('president')" data-role="president"><span class="role-icon">👑</span>社長</div>
      <div class="role-btn" onclick="selectRole('manager')" data-role="manager"><span class="role-icon">🏪</span>店長</div>
      <div class="role-btn" onclick="selectRole('driver')" data-role="driver"><span class="role-icon">🚚</span>配送</div>
      <div class="role-btn" onclick="selectRole('sales')" data-role="sales"><span class="role-icon">📋</span>販売管理</div>
      <div class="role-btn" onclick="selectRole('accounting')" data-role="accounting"><span class="role-icon">💰</span>経理管理</div>
      <div class="role-btn" onclick="selectRole('store')" data-role="store"><span class="role-icon">🏬</span>店舗販売</div>
    </div>
    <div class="pin-wrap" id="pin-wrap" style="display:none">
      <div class="pin-label" id="pin-label">PINを入力してください</div>
      <div class="pin-dots" id="pin-dots">
        <div class="pin-dot" id="d0"></div><div class="pin-dot" id="d1"></div>
        <div class="pin-dot" id="d2"></div><div class="pin-dot" id="d3"></div>
      </div>
      <div class="pin-pad">
        <div class="pin-key" onclick="pinInput('1')">1</div><div class="pin-key" onclick="pinInput('2')">2</div><div class="pin-key" onclick="pinInput('3')">3</div>
        <div class="pin-key" onclick="pinInput('4')">4</div><div class="pin-key" onclick="pinInput('5')">5</div><div class="pin-key" onclick="pinInput('6')">6</div>
        <div class="pin-key" onclick="pinInput('7')">7</div><div class="pin-key" onclick="pinInput('8')">8</div><div class="pin-key" onclick="pinInput('9')">9</div>
        <div class="pin-key" onclick="pinClear()" style="font-size:13px;font-weight:600">←</div>
        <div class="pin-key" onclick="pinInput('0')">0</div>
        <div class="pin-key" onclick="pinReset()" style="font-size:11px;color:#f54e6e;font-weight:600">CLR</div>
      </div>
      <div class="login-err" id="login-err"></div>
    </div>
  </div>
</div>

<!-- ===== MAIN APP ===== -->
<div id="app-screen" style="display:none;flex-direction:column;min-height:100vh">
  <div class="app-header">
    <div class="hbrand">
      <div class="hbrand-mark">📊</div>
      <div class="hbrand-text">芦塚酒店</div>
    </div>
    <div class="hdiv"></div>
    <div class="hkpi-bar" id="header-kpi"></div>
    <div class="hright">
      <span class="user-name" id="header-user"></span>
      <span class="role-tag" id="header-role"></span>
      <button class="logout-btn" onclick="logout()">ログアウト</button>
    </div>
  </div>
  <div class="app-body">
    <div class="sidebar" id="sidebar"></div>
    <div class="content" id="content"></div>
  </div>
</div>

<script>
const API='http://localhost:3001';
const PINS={president:'1234',manager:'5678',driver:'1111',sales:'2222',accounting:'3333',store:'4444'};
const ROLE_NAMES={president:'社長',manager:'店長',driver:'配送',sales:'販売管理',accounting:'経理管理',store:'店舗販売'};
let currentRole=null,pinBuffer='',employees=[],approvals={};

/* ─── ログイン ─── */
function selectRole(role){
  currentRole=role;
  document.querySelectorAll('.role-btn').forEach(b=>b.classList.remove('selected'));
  document.querySelector(`[data-role="${role}"]`).classList.add('selected');
  document.getElementById('pin-wrap').style.display='';
  document.getElementById('pin-label').textContent=ROLE_NAMES[role]+' のPINを入力';
  pinReset();
}
function pinInput(d){if(pinBuffer.length>=4)return;pinBuffer+=d;updateDots();if(pinBuffer.length===4)setTimeout(checkPin,150);}
function pinClear(){pinBuffer=pinBuffer.slice(0,-1);updateDots();}
function pinReset(){pinBuffer='';updateDots();document.getElementById('login-err').textContent='';}
function updateDots(){for(let i=0;i<4;i++)document.getElementById('d'+i).classList.toggle('filled',i<pinBuffer.length);}
function checkPin(){
  if(pinBuffer===PINS[currentRole]){loginSuccess();}
  else{document.getElementById('login-err').textContent='PINが違います';pinReset();}
}
function loginSuccess(){
  document.getElementById('login-screen').style.display='none';
  const app=document.getElementById('app-screen');
  app.style.display='flex';
  document.getElementById('header-role').textContent=ROLE_NAMES[currentRole];
  document.getElementById('header-user').textContent=getRolePerson(currentRole);
  renderHeaderKpi();
  buildSidebar();
  loadData();
}
function getRolePerson(r){
  return{president:'芦塚 義幸',manager:'赤川 秀敏',driver:'（配送員）',sales:'川原 未香',accounting:'芦塚 あかね',store:'（店舗販売）'}[r]||'';
}
function logout(){
  currentRole=null;pinBuffer='';
  document.getElementById('app-screen').style.display='none';
  document.getElementById('login-screen').style.display='flex';
  document.querySelectorAll('.role-btn').forEach(b=>b.classList.remove('selected'));
  document.getElementById('pin-wrap').style.display='none';
}

/* ─── ヘッダーKPI ─── */
function renderHeaderKpi(){
  if(!['president','manager'].includes(currentRole)){document.getElementById('header-kpi').innerHTML='';return;}
  const s=MOCK_MONTHLY_SALES[5],prev=MOCK_MONTHLY_SALES[4];
  const diff=((s-prev)/prev*100).toFixed(1);
  const achv=(s/22000000*100).toFixed(1);
  const totalDeliv=MOCK_DELIVERY.reduce((a,d)=>a+d.deliveries,0);
  const totCont=MOCK_DELIVERY.reduce((a,d)=>a+d.containers,0);
  const totContT=MOCK_DELIVERY.reduce((a,d)=>a+d.containerTarget,0);
  const contRate=(totCont/totContT*100).toFixed(0);
  document.getElementById('header-kpi').innerHTML=`
    <div class="hkpi"><div class="hkpi-v">¥${(s/10000).toFixed(0)}万</div><div class="hkpi-l">今月売上</div></div>
    <div class="hkpi"><div class="hkpi-v ${+diff>=0?'up':'down'}">${+diff>=0?'▲':'▼'}${Math.abs(diff)}%</div><div class="hkpi-l">前月比</div></div>
    <div class="hkpi"><div class="hkpi-v ${+achv>=100?'gold':'ok'}">${achv}%</div><div class="hkpi-l">目標達成率</div></div>
    <div class="hkpi"><div class="hkpi-v">${totalDeliv}件</div><div class="hkpi-l">配送件数</div></div>
    <div class="hkpi"><div class="hkpi-v ${+contRate>=90?'ok':'warn'}">${contRate}%</div><div class="hkpi-l">空容器回収率</div></div>
    <div class="hkpi"><div class="hkpi-v warn">${getPendingCount()}件</div><div class="hkpi-l">承認待ち</div></div>`;
}

/* ─── サイドバー ─── */
const NAV={
  president:[

/* ─── ユーティリティ ─── */
function bonusLabel(s){if(s>=120)return'×1.30';if(s>=110)return'×1.20';if(s>=100)return'×1.10';if(s>=85)return'×1.05';return'×1.00';}
const BAR_MAX=130;
function sbar(score,w){
  const pct=Math.min(score,BAR_MAX)/BAR_MAX*100;
  const mp=(100/BAR_MAX*100).toFixed(1);
  const fill=score>=100?'linear-gradient(90deg,#d97706,#fbbf24)':'linear-gradient(90deg,#f97316,#ea580c)';
  const cls=score>=100?'over':score>=85?'ok':score>=70?'mid':'low';
  return `<div class="sbar-wrap"${w?` style="width:${w}"`:''}><div class="sbar"><div class="sbar-fill" style="width:${pct.toFixed(1)}%;background:${fill}"></div><div class="sbar-mark" style="left:${mp}%"></div></div><span class="snum ${cls}">${score}</span></div>`;
}
function fmtMoney(v){return v>=10000?'¥'+(v/10000).toFixed(0)+'万':'¥'+v.toLocaleString();}
function rateCls(r,good=100){return+r>=good?'ok':+r>=good*0.9?'warn':'down';}
function pageHd(title,sub){return`<div class="page-hd"><h2>${title}</h2>${sub?`<span>${sub}</span>`:''}</div>`;}

        ${isMgr?`<div style="margin-top:10px"><div style="font-size:11px;color:var(--tx2);margin-bottom:4px;font-weight:500">店長コメント</div><textarea class="comment-box" id="mgr-${e.id}" placeholder="評価コメントを入力…">${ap.managerComment||''}</textarea><button class="btn btn-save" onclick="saveManagerComment('${e.id}')" style="margin-top:6px">保存</button></div>`:''}
        ${isPrs?`<div style="margin-top:10px">
          ${ap.managerComment?`<div style="background:var(--bg);border-radius:var(--rs);padding:8px 12px;font-size:12px;color:var(--tx2);margin-bottom:10px;border:1px solid var(--bd)"><div style="font-size:10px;color:var(--tx3);margin-bottom:4px;font-weight:700;text-transform:uppercase;letter-spacing:.04em">店長コメント</div>${ap.managerComment}</div>`:'<div style="font-size:11px;color:var(--tx3);margin-bottom:10px">店長コメントなし</div>'}
          <div style="font-size:11px;color:var(--tx2);margin-bottom:4px;font-weight:500">社長コメント</div>
          <textarea class="comment-box" id="prs-${e.id}" placeholder="最終コメントを入力…">${ap.presidentComment||''}</textarea>
          <div style="margin-top:8px">${ap.presidentApproved?'<span class="approved-tag">✅ 承認済み · 確定</span>':`<button class="btn btn-approve" onclick="approveEval('${e.id}')">✅ 承認 · 確定</button>`}</div>
        </div>`:''}
      </div>
    </div>`;
  }).join('')}`;
}
function saveManagerComment(id){approvals[id]={...(approvals[id]||{}),managerComment:document.getElementById('mgr-'+id).value};alert('保存しました');}
function approveEval(id){approvals[id]={...(approvals[id]||{}),presidentComment:document.getElementById('prs-'+id).value,presidentApproved:true};renderPage('evaluations');renderHeaderKpi();}
