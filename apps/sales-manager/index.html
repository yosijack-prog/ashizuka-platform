<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sales Manager – 芦塚酒店</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* === Design Tokens === */
:root{
  --bg:#060c17;--sf:#0d1525;--sf2:#142035;--sf3:#1b2a46;
  --bd:#1e2e48;--bd2:#2a3e5e;
  --tx:#e6f0fa;--tx2:#7a92a8;--tx3:#384d64;
  --ac:#f97316;--ac-bg:rgba(249,115,22,.10);--ac-bd:rgba(249,115,22,.25);
  --gn:#10d9a0;--gn-bg:rgba(16,217,160,.08);
  --am:#f5a623;--am-bg:rgba(245,166,35,.08);
  --rd:#f54e6e;--rd-bg:rgba(245,78,110,.08);
  --bl:#4da6ff;--bl-bg:rgba(77,166,255,.08);
  --gd:#fbbf24;
  --r:10px;--rs:6px;--rl:14px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter','Hiragino Sans','Yu Gothic',system-ui,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;font-size:13px;line-height:1.5;-webkit-font-smoothing:antialiased}

/* ===== LOGIN ===== */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;
  background:radial-gradient(ellipse 70% 50% at 50% 0%,rgba(249,115,22,.07) 0%,transparent 65%),
             linear-gradient(160deg,#0d1525 0%,#060c17 100%)}
.login-box{background:rgba(13,21,37,.92);backdrop-filter:blur(20px);border:1px solid var(--bd);border-radius:var(--rl);padding:40px 36px;width:420px;text-align:center;box-shadow:0 8px 48px rgba(0,0,0,.6)}
.login-mark{width:52px;height:52px;background:linear-gradient(135deg,#f97316,#ea580c);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 14px;box-shadow:0 4px 24px rgba(249,115,22,.35)}
.login-title{font-size:22px;font-weight:800;color:var(--tx);letter-spacing:-.02em;margin-bottom:3px}
.login-sub{font-size:12px;color:var(--tx2);margin-bottom:28px;font-weight:500}
.role-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:24px}
.role-btn{padding:13px 6px 10px;border-radius:var(--r);border:1px solid var(--bd);background:var(--sf);color:var(--tx2);font-size:11px;font-weight:600;cursor:pointer;transition:all .18s;font-family:inherit}
.role-btn:hover{border-color:var(--ac-bd);color:var(--ac);background:var(--ac-bg)}
.role-btn.selected{border-color:var(--ac);background:var(--ac-bg);color:#fb923c;box-shadow:0 0 0 1px rgba(249,115,22,.18)}
.role-btn .role-icon{font-size:22px;display:block;margin-bottom:5px}
.pin-wrap{margin-bottom:12px}
.pin-label{font-size:12px;color:var(--tx2);margin-bottom:14px;font-weight:500}
.pin-dots{display:flex;gap:10px;justify-content:center;margin-bottom:16px}
.pin-dot{width:12px;height:12px;border-radius:50%;border:2px solid var(--bd2);background:transparent;transition:all .15s}
.pin-dot.filled{background:var(--ac);border-color:var(--ac);box-shadow:0 0 10px rgba(249,115,22,.5)}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
.pin-key{padding:14px 6px;border-radius:var(--rs);border:1px solid var(--bd);background:var(--sf);color:var(--tx);font-size:18px;font-weight:700;cursor:pointer;transition:all .12s;user-select:none;font-family:inherit}
.pin-key:hover{background:var(--sf2);border-color:var(--bd2)}
.pin-key:active{transform:scale(.94);background:var(--sf3)}
.login-err{color:#f87171;font-size:12px;margin-top:10px;min-height:18px;font-weight:500}

/* ===== APP SHELL ===== */
#app-screen{display:none;flex-direction:column;min-height:100vh}
.app-header{background:var(--sf);border-bottom:1px solid var(--bd);padding:0 20px;height:50px;display:flex;align-items:center;position:sticky;top:0;z-index:100;flex-shrink:0}
.hbrand{display:flex;align-items:center;gap:9px;flex-shrink:0;padding-right:18px}
.hbrand-mark{width:30px;height:30px;background:linear-gradient(135deg,#f97316,#ea580c);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.hbrand-text{font-size:14px;font-weight:800;color:var(--tx);letter-spacing:-.02em;white-space:nowrap}
.hdiv{width:1px;height:26px;background:var(--bd);flex-shrink:0;margin:0 4px}
.hkpi-bar{display:flex;align-items:stretch;flex:1;overflow:hidden}
.hkpi{display:flex;flex-direction:column;justify-content:center;padding:0 14px;border-right:1px solid var(--bd)}
.hkpi-v{font-size:15px;font-weight:800;line-height:1.1;color:var(--tx)}
.hkpi-l{font-size:10px;color:var(--tx2);margin-top:1px;white-space:nowrap;font-weight:500}
.hright{display:flex;align-items:center;gap:8px;margin-left:auto;flex-shrink:0}
.role-tag{font-size:11px;background:var(--ac-bg);color:#fb923c;border:1px solid var(--ac-bd);padding:3px 10px;border-radius:999px;font-weight:600}
.user-name{font-size:12px;color:var(--tx2);font-weight:500}
.logout-btn{padding:5px 12px;border-radius:var(--rs);border:1px solid var(--bd);background:transparent;color:var(--tx2);font-size:11px;font-weight:500;cursor:pointer;transition:all .15s;font-family:inherit}
.logout-btn:hover{border-color:var(--rd);color:var(--rd)}

/* ===== TOAST ===== */
#toast-container{position:fixed;bottom:24px;right:24px;display:flex;flex-direction:column;gap:10px;z-index:9999;pointer-events:none}
.toast{padding:12px 18px;border-radius:10px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:10px;min-width:240px;max-width:360px;backdrop-filter:blur(12px);box-shadow:0 4px 24px rgba(0,0,0,.5);pointer-events:auto;transform:translateX(120%);transition:transform .3s cubic-bezier(.34,1.56,.64,1);border:1px solid}
.toast.show{transform:translateX(0)}
.toast.info{background:rgba(13,21,37,.95);border-color:var(--bd2);color:var(--tx)}
.toast.success{background:rgba(16,55,40,.95);border-color:rgba(16,217,160,.4);color:#10d9a0}
.toast.error{background:rgba(55,13,20,.95);border-color:rgba(245,78,110,.4);color:#f54e6e}
.toast.warning{background:rgba(55,40,13,.95);border-color:rgba(245,166,35,.4);color:#f5a623}
.toast-icon{font-size:16px;flex-shrink:0}

/* ===== LAYOUT ===== */
.app-body{display:flex;flex:1;height:calc(100vh - 50px)}
.sidebar{width:200px;background:var(--sf);border-right:1px solid var(--bd);padding:8px 0 20px;flex-shrink:0;overflow-y:auto}
.nav-section{font-size:10px;color:var(--tx3);padding:12px 16px 4px;text-transform:uppercase;letter-spacing:.07em;font-weight:700}
.nav-item{display:flex;align-items:center;gap:8px;padding:8px 14px 8px 16px;font-size:13px;font-weight:500;color:var(--tx2);cursor:pointer;transition:all .12s;position:relative;white-space:nowrap}
.nav-item:hover{background:rgba(249,115,22,.06);color:var(--tx)}
.nav-item.active{background:var(--ac-bg);color:var(--ac);font-weight:600}
.nav-item.active::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--ac);border-radius:0 2px 2px 0}
.ni{font-size:14px;flex-shrink:0}
.nav-sep{height:1px;background:var(--bd);margin:8px 16px}
.content{flex:1;overflow-y:auto;padding:20px}

/* ===== PAGE HEADER ===== */
.page-hd{display:flex;align-items:baseline;gap:10px;margin-bottom:18px}
.page-hd h2{font-size:18px;font-weight:800;color:var(--tx);letter-spacing:-.02em}
.page-hd span{font-size:12px;color:var(--tx2);font-weight:500}

/* ===== GRID ===== */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.g6{display:grid;grid-template-columns:repeat(6,1fr);gap:12px}
.span2{grid-column:span 2}.span3{grid-column:span 3}

/* ===== KPI CARDS ===== */
.kpi{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:14px 16px 14px 19px;position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--bd2);border-radius:0 2px 2px 0}
.kpi.accent::before{background:var(--ac)}.kpi.green::before{background:var(--gn)}
.kpi.red::before{background:var(--rd)}.kpi.amber::before{background:var(--am)}
.kpi.accent{border-color:rgba(249,115,22,.18);background:rgba(249,115,22,.04)}
.kpi.green{border-color:rgba(16,217,160,.18);background:rgba(16,217,160,.04)}
.kpi.red{border-color:rgba(245,78,110,.18);background:rgba(245,78,110,.04)}
.kpi.amber{border-color:rgba(245,166,35,.18);background:rgba(245,166,35,.04)}
.kpi-l{font-size:11px;color:var(--tx2);margin-bottom:6px;display:flex;align-items:center;gap:4px;font-weight:500}
.kpi-v{font-size:26px;font-weight:800;line-height:1;color:var(--tx);letter-spacing:-.02em}
.kpi-v.sm{font-size:21px}.kpi-v.lg{font-size:34px}
.kpi-sub{font-size:11px;margin-top:5px;color:var(--tx2)}
.up{color:var(--gn)!important}.down{color:var(--rd)!important}.warn{color:var(--am)!important}.gold{color:var(--gd)!important}.ok{color:var(--gn)!important}

/* ===== PANELS ===== */
.panel{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);margin-bottom:14px;overflow:hidden}
.panel-head{padding:10px 16px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;background:rgba(0,0,0,.12)}
.panel-title{font-size:13px;font-weight:700;color:var(--tx);display:flex;align-items:center;gap:8px;letter-spacing:-.01em}
.panel-title::before{content:'';width:3px;height:14px;background:var(--ac);border-radius:2px;display:inline-block;flex-shrink:0}
.panel-body{padding:14px 16px}
.panel-sub{font-size:11px;color:var(--tx2);font-weight:500}

/* ===== TABLE ===== */
.tbl{width:100%;border-collapse:collapse}
.tbl th{background:rgba(0,0,0,.18);padding:7px 10px;font-size:10px;color:var(--tx2);font-weight:700;text-align:left;border-bottom:1px solid var(--bd);white-space:nowrap;letter-spacing:.04em;text-transform:uppercase}
.tbl td{padding:9px 10px;font-size:12px;border-bottom:1px solid rgba(30,46,72,.7);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:rgba(249,115,22,.025)}
.tbl td.num{text-align:right;font-weight:600;font-variant-numeric:tabular-nums}
.tbl th.num{text-align:right}
.tbl-total td{border-top:2px solid var(--bd);font-weight:700;background:rgba(0,0,0,.15)!important}

/* ===== SCORE BAR ===== */
.sbar-wrap{display:flex;align-items:center;gap:7px}
.sbar{flex:1;height:6px;background:var(--bg);border-radius:3px;position:relative;min-width:60px}
.sbar-fill{height:100%;border-radius:3px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.sbar-mark{position:absolute;top:-4px;width:2px;height:14px;background:var(--bd2);border-radius:1px}
.snum{font-size:12px;font-weight:700;min-width:30px;text-align:right}
.over{color:var(--gd)!important}.mid{color:var(--am)!important}.low{color:var(--rd)!important}

/* ===== CHARTS ===== */
.bar-chart{display:flex;align-items:flex-end;gap:8px;height:120px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.bar-inner{width:100%;border-radius:4px 4px 0 0;min-height:3px;transition:height .5s ease}
.bar-lbl{font-size:10px;color:var(--tx2);font-weight:500}
.bar-val{font-size:10px;font-weight:700}
.chart-axis{border-top:1px solid var(--bd);margin-top:4px}
.chart-foot{display:flex;justify-content:space-between;font-size:10px;color:var(--tx2);margin-top:7px;padding:0 2px}

/* ===== BADGES ===== */
.badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:5px;font-size:11px;font-weight:600;line-height:1.4}
.badge-green{background:rgba(16,217,160,.10);color:#10d9a0;border:1px solid rgba(16,217,160,.22)}
.badge-amber{background:rgba(251,191,36,.10);color:#fbbf24;border:1px solid rgba(251,191,36,.22)}
.badge-red{background:rgba(245,78,110,.10);color:#f54e6e;border:1px solid rgba(245,78,110,.22)}
.badge-blue{background:rgba(77,166,255,.10);color:#4da6ff;border:1px solid rgba(77,166,255,.22)}
.badge-orange{background:rgba(249,115,22,.10);color:#fb923c;border:1px solid rgba(249,115,22,.22)}
.badge-pending{background:rgba(249,115,22,.15);color:#fed7aa;border:1px solid rgba(249,115,22,.28);margin-left:auto;font-size:10px;padding:1px 6px}

/* ===== AVATAR ===== */
.av{border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-weight:700;color:#fff;flex-shrink:0}
.av-sm{width:24px;height:24px;font-size:10px}
.av-md{width:32px;height:32px;font-size:13px}
.av-lg{width:42px;height:42px;font-size:17px}

/* ===== EVAL CARD ===== */
.eval-card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);margin-bottom:8px;transition:border-color .15s}
.eval-card:hover{border-color:var(--bd2)}
.eval-head{padding:14px 16px;display:flex;align-items:center;gap:10px;cursor:pointer}
.eval-head:hover{background:rgba(249,115,22,.03)}
.eval-body{padding:0 16px 14px;display:none}
.eval-card.open .eval-body{display:block}
.comment-box{width:100%;background:var(--bg);border:1px solid var(--bd);border-radius:var(--rs);padding:8px 10px;color:var(--tx);font-size:12px;resize:vertical;min-height:52px;margin-top:6px;font-family:inherit;transition:border-color .15s}
.comment-box:focus{outline:none;border-color:var(--ac)}
.btn{padding:6px 14px;border-radius:var(--rs);border:none;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s}
.btn-approve{background:var(--ac);color:#fff}.btn-approve:hover{opacity:.85}
.btn-save{background:var(--sf2);color:var(--tx);border:1px solid var(--bd)}.btn-save:hover{background:var(--sf3)}
.approved-tag{display:inline-flex;align-items:center;gap:4px;padding:4px 12px;border-radius:5px;background:rgba(16,217,160,.08);color:var(--gn);border:1px solid rgba(16,217,160,.22);font-size:12px;font-weight:600}

/* ===== MY HERO ===== */
.my-hero{background:linear-gradient(135deg,rgba(249,115,22,.08) 0%,rgba(6,12,23,0) 65%);border:1px solid rgba(249,115,22,.22);border-radius:var(--r);padding:28px;text-align:center;margin-bottom:14px}
.divider{height:1px;background:var(--bd);margin:12px 0}

/* ===== EVAL WEIGHT PANEL ===== */
.wt-grid{display:grid;grid-template-columns:90px repeat(5,1fr);gap:6px;align-items:center}
.wt-head{font-size:10px;color:var(--tx2);font-weight:700;text-align:center;text-transform:uppercase;letter-spacing:.04em;padding:4px 2px}
.wt-role{font-size:11px;color:var(--tx);font-weight:600;padding:6px 0}
.wt-cell{position:relative}
.wt-inp{width:100%;background:var(--bg);border:1px solid var(--bd);border-radius:5px;color:var(--tx);font-size:14px;font-weight:700;padding:5px 2px;text-align:center;font-family:inherit;transition:border-color .15s}
.wt-inp:focus{outline:none;border-color:var(--ac)}
.wt-inp.err{border-color:var(--rd);color:var(--rd)}
.wt-sum{font-size:11px;font-weight:700;text-align:center;padding:4px 0}
.axis-row{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin:8px 0 4px}
.axis-box{background:var(--bg);border:1px solid var(--bd);border-radius:6px;padding:7px 6px;text-align:center}
.axis-score{font-size:18px;font-weight:900;line-height:1.1}
.axis-wt{font-size:10px;color:var(--tx3);margin-top:2px}
.axis-lbl{font-size:10px;color:var(--tx2);margin-top:3px;font-weight:500}
.real-data-row{display:flex;gap:10px;flex-wrap:wrap;margin:8px 0;padding:10px 12px;background:rgba(0,0,0,.2);border-radius:6px;border:1px solid var(--bd)}
.rdat{text-align:center;flex:1;min-width:70px}
.rdat-v{font-size:16px;font-weight:800;line-height:1.1}
.rdat-l{font-size:10px;color:var(--tx2);margin-top:2px;white-space:nowrap}

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px}
::-webkit-scrollbar-thumb:hover{background:var(--tx3)}
</style>
</head>
<body>

<!-- ===== LOGIN ===== -->
<div id="toast-container"></div>

<div id="login-screen">
  <div class="login-box">
    <div class="login-mark">🍶</div>
    <div class="login-title">芦塚酒店</div>
    <div class="login-sub">Sales Manager · 経営管理システム</div>
    <div class="role-grid" id="role-grid">
      <div class="role-btn" onclick="selectRole('president')" data-role="president"><span class="role-icon">👑</span>社長</div>
      <div class="role-btn" onclick="selectRole('manager')" data-role="manager"><span class="role-icon">🏪</span>店長</div>
      <div class="role-btn" onclick="selectRole('driver')" data-role="driver"><span class="role-icon">🚚</span>配送</div>
      <div class="role-btn" onclick="selectRole('sales')" data-role="sales"><span class="role-icon">📋</span>販売管理</div>
      <div class="role-btn" onclick="selectRole('accounting')" data-role="accounting"><span class="role-icon">💰</span>経理管理</div>
      <div class="role-btn" onclick="selectRole('store')" data-role="store"><span class="role-icon">🏬</span>店舗販売</div>
    </div>
    <div class="pin-wrap" id="pin-wrap" style="display:none">
      <div class="pin-label" id="pin-label">PINを入力してください</div>
      <div class="pin-dots" id="pin-dots">
        <div class="pin-dot" id="d0"></div><div class="pin-dot" id="d1"></div>
        <div class="pin-dot" id="d2"></div><div class="pin-dot" id="d3"></div>
      </div>
      <div class="pin-pad">
        <div class="pin-key" onclick="pinInput('1')">1</div><div class="pin-key" onclick="pinInput('2')">2</div><div class="pin-key" onclick="pinInput('3')">3</div>
        <div class="pin-key" onclick="pinInput('4')">4</div><div class="pin-key" onclick="pinInput('5')">5</div><div class="pin-key" onclick="pinInput('6')">6</div>
        <div class="pin-key" onclick="pinInput('7')">7</div><div class="pin-key" onclick="pinInput('8')">8</div><div class="pin-key" onclick="pinInput('9')">9</div>
        <div class="pin-key" onclick="pinClear()" style="font-size:13px;font-weight:600">←</div>
        <div class="pin-key" onclick="pinInput('0')">0</div>
        <div class="pin-key" onclick="pinReset()" style="font-size:11px;color:#f54e6e;font-weight:600">CLR</div>
      </div>
      <div class="login-err" id="login-err"></div>
    </div>
  </div>
</div>

<!-- ===== MAIN APP ===== -->
<div id="app-screen" style="display:none;flex-direction:column;min-height:100vh">
  <div class="app-header">
    <div class="hbrand">
      <div class="hbrand-mark">📊</div>
      <div class="hbrand-text">芦塚酒店</div>
    </div>
    <div class="hdiv"></div>
    <div class="hkpi-bar" id="header-kpi"></div>
    <div class="hright">
      <span class="user-name" id="header-user"></span>
      <span class="role-tag" id="header-role"></span>
      <button id="mf-btn" onclick="toggleMFConnect()" style="display:none;padding:4px 12px;border-radius:6px;border:1px solid;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s"></button>
      <button class="logout-btn" onclick="logout()">ログアウト</button>
    </div>
  </div>
  <div class="app-body">
    <div class="sidebar" id="sidebar"></div>
    <div class="content" id="content"></div>
  </div>
</div>

<script>
const API='http://localhost:3001';
const PINS={president:'1234',manager:'5678',driver:'1111',sales:'2222',accounting:'3333',store:'4444'};
const ROLE_NAMES={president:'社長',manager:'店長',driver:'配送',sales:'販売管理',accounting:'経理管理',store:'店舗販売'};
let currentRole=null,pinBuffer='',employees=[],approvals={};

/* ─── ログイン ─── */
function selectRole(role){
  currentRole=role;
  document.querySelectorAll('.role-btn').forEach(b=>b.classList.remove('selected'));
  document.querySelector(`[data-role="${role}"]`).classList.add('selected');
  document.getElementById('pin-wrap').style.display='';
  document.getElementById('pin-label').textContent=ROLE_NAMES[role]+' のPINを入力';
  pinReset();
}
function pinInput(d){if(pinBuffer.length>=4)return;pinBuffer+=d;updateDots();if(pinBuffer.length===4)setTimeout(checkPin,150);}
function pinClear(){pinBuffer=pinBuffer.slice(0,-1);updateDots();}

// 実データから各軸スコア（0〜130）を算出
function calcAxisScores(empId){
  const NM={emp_tan:'谷口 亮介',emp_oku:'奥田 玲晃',emp_abi:'阿比留 徹',emp_aka:'赤川 秀敏',emp_ima:'今村 淳子',emp_kaw:'川原 未香',emp_ash:'芦塚 義幸',emp_ake:'芦塚 あかね',emp_sak:'酒井 さやか'};
  const name=NM[empId];
  // 1. 売上達成: Q1-2026 vs Q1-2025
  const rep=name&&REAL_REP_MONTHLY[name];
  let salesSc=100;
  if(rep){
    const q26=(rep.y2026[0]||0)+(rep.y2026[1]||0)+(rep.y2026[2]||0);
    const q25=(rep.y2025[0]||0)+(rep.y2025[1]||0)+(rep.y2025[2]||0);
    if(q25>200000) salesSc=Math.min(130,Math.round(q26/q25*100));
    else if(q26>0) salesSc=108; // 新任・データ不足
    else salesSc=88;
  }
  // 2. 顧客維持: 確定チャーン数からペナルティ
  const danger=REAL_DANGER_BY_REP.find(d=>d.name===name);
  let custSc=100;
  if(danger) custSc=Math.max(55,Math.round(100-danger.churn*0.45));
  // 3. 勤怠: 遅刻・欠勤ペナルティ
  const att=ATTENDANCE_DATA.find(d=>d.id===empId);
  let attSc=100;
  if(att){
    attSc-=att.lateCount*6;
    attSc-=att.absenceCount*10;
    if(att.overtimeH>40) attSc-=Math.round((att.overtimeH-40)/3);
    attSc=Math.max(55,attSc);
  }
  // 4. 粗利貢献: SQL実データ（Q1-2026 粗利率 / 目標22% ※業界実績値）
  // 目標値: チーム平均20.7% → 22%以上で満点・最高27.4%（奥田）
  // 取得元: T_売上伝票明細.粗利 / T_売上伝票明細.金額 (2026-01〜03)
  const REAL_MARGIN_RATE={emp_tan:18.4,emp_oku:27.4,emp_abi:21.9,emp_aka:20.2,emp_ima:20.9,emp_kaw:20.8,emp_ash:0,emp_ake:0,emp_sak:21.3};
  const TARGET_MARGIN=22.0; // Q1-2025 実績最高が23.1% (阿比留) → 22%を100点ラインに設定
  const myMargin=REAL_MARGIN_RATE[empId]||20.0;
  const marginSc=myMargin>0?Math.min(130,Math.round(myMargin/TARGET_MARGIN*100)):85;
  // 5. 新規顧客開拓: SQL実データ（Q1-2026 純新規取引先数）
  // 取得元: Q1-2026初発注の得意先コード（過去発注履歴なし）
  // 新任補正: 谷口・奥田（2025年8月着任）は母数が少ないため目標を調整
  // 既存担当目標: 5社/Q → 100点。新任担当目標: 8社/Q（積極展開期待）
  const REAL_NEW_CUST={emp_tan:13,emp_oku:17,emp_abi:7,emp_aka:6,emp_ima:7,emp_kaw:9,emp_ash:0,emp_ake:0,emp_sak:1};
  const NEW_TARGET={emp_tan:8,emp_oku:8,emp_abi:5,emp_aka:5,emp_ima:5,emp_kaw:5,emp_ash:5,emp_ake:3,emp_sak:3};
  const myNew=REAL_NEW_CUST[empId]||0;
  const myNewT=NEW_TARGET[empId]||5;
  const newSc=Math.min(130,Math.round(myNew/myNewT*100));
  return [salesSc,custSc,attSc,marginSc,newSc];
}

  if(!evalRoleWeights[role]) evalRoleWeights[role]=[20,20,20,20,20];
  evalRoleWeights[role][idx]=Math.max(0,Math.min(100,+val||0));
  // 合計チェック＆表示更新
  const sum=evalRoleWeights[role].reduce((a,b)=>a+b,0);
  const safeRole=role.replace(/\s/g,'_');

  if(sumEl){sumEl.textContent=`合計: ${sum}`;sumEl.style.color=sum===100?'#10d9a0':'#f54e6e';}

  for(let i=0;i<5;i++){const el=document.getElementById(`wt-${safeRole}-${i}`);if(el)el.classList.toggle('err',sum!==100);}
}

/* ─── トースト通知 ─── */
function toast(msg, type='info', duration=4000){
  const c=document.getElementById('toast-container');
  const el=document.createElement('div');
  const icons={info:'ℹ️',success:'✅',error:'❌',warning:'⚠️'};
  el.className=`toast ${type}`;
  el.innerHTML=`<span class="toast-icon">${icons[type]||'ℹ️'}</span><span>${msg}</span>`;
  c.appendChild(el);
  requestAnimationFrame(()=>requestAnimationFrame(()=>el.classList.add('show')));
  setTimeout(()=>{el.classList.remove('show');setTimeout(()=>el.remove(),400);},duration);
  return el;
}

/* ─── ユーティリティ ─── */
function bonusLabel(s){if(s>=120)return'×1.30';if(s>=110)return'×1.20';if(s>=100)return'×1.10';if(s>=85)return'×1.05';return'×1.00';}
const BAR_MAX=130;
function sbar(score,w){
  const pct=Math.min(score,BAR_MAX)/BAR_MAX*100;
  const mp=(100/BAR_MAX*100).toFixed(1);
  const fill=score>=100?'linear-gradient(90deg,#d97706,#fbbf24)':'linear-gradient(90deg,#f97316,#ea580c)';
  const cls=score>=100?'over':score>=85?'ok':score>=70?'mid':'low';
  return `<div class="sbar-wrap"${w?` style="width:${w}"`:''}><div class="sbar"><div class="sbar-fill" style="width:${pct.toFixed(1)}%;background:${fill}"></div><div class="sbar-mark" style="left:${mp}%"></div></div><span class="snum ${cls}">${score}</span></div>`;
}
function fmtMoney(v){return v>=10000?'¥'+(v/10000).toFixed(0)+'万':'¥'+v.toLocaleString();}
function rateCls(r,good=100){return+r>=good?'ok':+r>=good*0.9?'warn':'down';}
function pageHd(title,sub){return`<div class="page-hd"><h2>${title}</h2>${sub?`<span>${sub}</span>`:''}</div>`;}

let retChurnFilter='all'; // 'all' | empId | 'unresolved' | 'danger'

  const allGenres=[...new Set(emps.flatMap(([,v])=>v.genres.map(g=>g.genre)))];

  // 集計
  const totMaintained=emps.filter(([k])=>k!=='emp_aka').reduce((s,[,v])=>s+v.genres.reduce((a,g)=>a+g.maintained,0),0);
  const totCustomers =emps.filter(([k])=>k!=='emp_aka').reduce((s,[,v])=>s+v.genres.reduce((a,g)=>a+g.total,0),0);

  const totalChurn   =MOCK_CHURN.length;
  const unresolvedC  =MOCK_CHURN.filter(c=>!c.resolved).length;
  const dangerC      =MOCK_CHURN.filter(c=>c.severity==='danger'&&!c.resolved).length;
  const resolvedC    =MOCK_CHURN.filter(c=>c.resolved).length;

  // フィルター後チャーン一覧
  let filtered=MOCK_CHURN;
  if(retChurnFilter==='unresolved') filtered=MOCK_CHURN.filter(c=>!c.resolved);
  else if(retChurnFilter==='danger') filtered=MOCK_CHURN.filter(c=>c.severity==='danger');
  else if(retChurnFilter!=='all') filtered=MOCK_CHURN.filter(c=>c.empId===retChurnFilter);

  // 全体維持率バー
  const overallCls=overallRate>=85?'ok':overallRate>=70?'warn':'down';

  return pageHd('評価検証','ジャンル別顧客維持率 · チャーン兆候 | 2026年3月')+`

    </div>
    <div class="kpi">
      <div class="kpi-l">🏅 対処スコア反映</div>
      <div class="kpi-v">${emps.filter(([k])=>k!=='emp_aka').reduce((s,[,v])=>s+v.respondedCount,0)}<span style="font-size:16px">件</span></div>

    <div class="panel-head"><div class="panel-title">ジャンル×社員 維持率マトリクス</div><span class="panel-sub">緑≥85% ／ 橙70-84% ／ 赤＜70%</span></div>

      <table class="tbl">
        <thead><tr>
          <th>ジャンル</th>

        </tr></thead>
        <tbody>${allGenres.map(genre=>{

function renderTrend(){
  const MONTHS=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  const reps=Object.entries(REAL_REP_MONTHLY);

  // 全社合計を追加
  const totalY24=Array(12).fill(0),totalY25=Array(12).fill(0),totalY26=Array(12).fill(0);
  reps.forEach(([,v])=>{ v.y2024.forEach((x,i)=>totalY24[i]+=x); v.y2025.forEach((x,i)=>totalY25[i]+=x); v.y2026.forEach((x,i)=>totalY26[i]+=x); });

  const selData=trendRep==='all'?{color:'#f97316',avatar:'全',y2024:totalY24,y2025:totalY25,y2026:totalY26}:REAL_REP_MONTHLY[trendRep];

  // SVGライングラフ生成
  function makeChart(y24,y25,y26,label){
    const W=560,H=140,pad={l:38,r:10,t:12,b:22};
    const iW=W-pad.l-pad.r, iH=H-pad.t-pad.b;
    const allVals=[...y24,...y25,...y26].filter(x=>x>0);
    if(!allVals.length) return '<div style="text-align:center;color:var(--tx3);padding:30px;font-size:12px">データなし</div>';
    const maxV=Math.max(...allVals)*1.08;
    const ym=n=>Math.round(n/10000);
    const px=(i)=>pad.l+i*(iW/11);
    const py=(v)=>pad.t+iH*(1-v/maxV);
    const pts=(arr)=>arr.map((v,i)=>v>0?`${px(i)},${py(v)}`:'').filter(Boolean);

    // y軸ラベル
    const yTicks=[0,0.25,0.5,0.75,1].map(r=>Math.round(maxV*r/10000)*10000);
    const yAxis=yTicks.map(v=>`
      <line x1="${pad.l}" x2="${W-pad.r}" y1="${py(v)}" y2="${py(v)}" stroke="rgba(255,255,255,.05)" stroke-width="1"/>
      <text x="${pad.l-4}" y="${py(v)+4}" text-anchor="end" fill="#384d64" font-size="9">${ym(v)}万</text>`).join('');

    // 線の生成（連続した点のみ接続）
    function makePath(arr,col,dash=''){
      const segs=[];let seg=[];
      arr.forEach((v,i)=>{
        if(v>0){seg.push(`${px(i)},${py(v)}`);}
        else if(seg.length){segs.push(seg);seg=[];}
      });
      if(seg.length)segs.push(seg);
      return segs.map(s=>`<polyline points="${s.join(' ')}" fill="none" stroke="${col}" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" ${dash?`stroke-dasharray="${dash}"`:''}/>`).join('');
    }
    function makeDots(arr,col){
      return arr.map((v,i)=>v>0?`<circle cx="${px(i)}" cy="${py(v)}" r="3" fill="${col}" stroke="var(--bg)" stroke-width="1.5"/>`:'').join('');
    }

    // x軸
    const xAxis=MONTHS.map((m,i)=>`<text x="${px(i)}" y="${H-4}" text-anchor="middle" fill="#384d64" font-size="9">${m}</text>`).join('');

    // YoY比テキスト（2025 vs 2024）
    const yoyBars=y25.map((v25,i)=>{
      const v24=y24[i];
      if(!v25||!v24)return'';
      const pct=Math.round((v25-v24)/v24*100);
      const col=pct>=10?'#10d9a0':pct>=-10?'#f5a623':'#f54e6e';
      return`<text x="${px(i)}" y="${py(v25)-7}" text-anchor="middle" fill="${col}" font-size="8" font-weight="700">${pct>0?'+':''}${pct}%</text>`;
    }).join('');

    return`<svg width="100%" viewBox="0 0 ${W} ${H}" style="display:block;max-width:${W}px">
      ${yAxis}${xAxis}
      ${makePath(y24,'rgba(77,166,255,.45)','5,3')}
      ${makePath(y25,'#f97316')}
      ${makePath(y26,'rgba(249,115,22,.35)','3,3')}
      ${makeDots(y24,'rgba(77,166,255,.7)')}
      ${makeDots(y25,'#f97316')}
      ${yoyBars}
    </svg>`;
  }

  // KPI: 2025年合計 vs 2024年合計
  const sum24=selData.y2024.reduce((a,b)=>a+b,0);
  const sum25=selData.y2025.reduce((a,b)=>a+b,0);

const MF_REDIRECT_URI='http://localhost:5176';

// ─── トークン管理 ───
function getMFToken(){
  const t=localStorage.getItem('mf_access_token');
  const e=localStorage.getItem('mf_token_expiry');
  if(!t||!e||Date.now()>parseInt(e)){
    localStorage.removeItem('mf_access_token');
    localStorage.removeItem('mf_token_expiry');
    return null;
  }
  return t;
}
function isMFConnected(){return getMFToken()!==null;}
function disconnectMF(){
  localStorage.removeItem('mf_access_token');
  localStorage.removeItem('mf_token_expiry');
}

// ─── OAuth2 ───
function startMFOAuth(){
  const state=Math.random().toString(36).slice(2);
  sessionStorage.setItem('mf_state',state);
  const p=new URLSearchParams({response_type:'code',client_id:MF_CLIENT_ID,redirect_uri:MF_REDIRECT_URI,scope:MF_SCOPES,state});
  window.location.href='https://api.biz.moneyforward.com/authorize?'+p;
}
async function handleMFCallback(){
  const p=new URLSearchParams(window.location.search);
  const code=p.get('code'),state=p.get('state');
  if(!code)return false;
  // state検証（デバッグ中は警告のみ、スキップしない）
  if(state!==sessionStorage.getItem('mf_state')){
    console.warn('MF state mismatch - stored:',sessionStorage.getItem('mf_state'),'received:',state);
  }
  const t=toast('🔄 マネーフォワードと同期中...','info',30000);
  try{
    const credentials=btoa(`${MF_CLIENT_ID}:${MF_CLIENT_SECRET}`);
    const r=await fetch('/mf-token/token',{
      method:'POST',
      headers:{'Content-Type':'application/x-www-form-urlencoded','Authorization':'Basic '+credentials},
      body:new URLSearchParams({grant_type:'authorization_code',code,redirect_uri:MF_REDIRECT_URI}),
    });
    if(!r.ok){
      const errText=await r.text().catch(()=>'');
      throw new Error(`トークン取得失敗 (${r.status}): ${errText.slice(0,80)}`);
    }
    const d=await r.json();
    localStorage.setItem('mf_access_token',d.access_token);
    localStorage.setItem('mf_token_expiry',String(Date.now()+d.expires_in*1000));
    sessionStorage.removeItem('mf_state');
    window.history.replaceState({},'',window.location.pathname);
    t.remove();
    toast('マネーフォワード 同期完了！財務データを取得しました。','success',5000);
    return true;
  }catch(e){
    t.remove();
    toast('同期エラー：'+e.message,'error',8000);
    console.error('MF callback error:',e);
    return false;
  }
}
async function mfGet(path){
  const token=getMFToken();
  if(!token)throw new Error('Not authenticated');
  const r=await fetch(path,{headers:{Authorization:'Bearer '+token,Accept:'application/json'}});
  if(r.status===401){disconnectMF();throw new Error('Token expired');}
  if(!r.ok)throw new Error('MF API error '+r.status);
  return r.json();
}

      <div class="kpi-sub">${fmtMoney(latest.opProfit)}</div>
    </div>
    <div class="kpi ${+laborRate<=20?'green':+laborRate<=25?'':'red'}">
      <div class="kpi-l">👥 人件費率</div>
      <div class="kpi-v ${+laborRate<=20?'ok':+laborRate<=25?'warn':'down'}">${laborRate}<span style="font-size:14px">%</span></div>
      <div class="kpi-sub">${fmtMoney(latest.laborCost)}</div>
    </div>
  </div>

  <!-- ━━ 月次PL推移（6ヶ月）━━ -->
  <div class="panel" style="margin-bottom:14px">
    <div class="panel-head">
      <div class="panel-title">月次 損益推移（6ヶ月）</div>
      <span class="panel-sub" style="color:${connected?'#10d9a0':'#f5a623'}">${connected?'MF会計 実データ':'モックデータ（参考値）'}</span>
    </div>
    <div class="panel-body" style="overflow-x:auto">
      <table class="tbl">
        <thead><tr>
          <th>月</th><th style="text-align:right">売上高</th><th style="text-align:right">粗利益</th>
          <th style="text-align:right">粗利率</th><th style="text-align:right">営業利益</th>
          <th style="text-align:right">営業利益率</th><th style="text-align:right">人件費</th>
          <th style="text-align:right">人件費率</th>
        </tr></thead>
        <tbody>
          ${pl.map((p,i)=>{
            const gm=(p.grossProfit/p.sales*100).toFixed(1);
            const om=(p.opProfit/p.sales*100).toFixed(1);
            const lr=(p.laborCost/p.sales*100).toFixed(1);
            const isLatest=i===pl.length-1;
            return `<tr style="${isLatest?'background:rgba(249,115,22,.05);':''}">
              <td style="font-weight:${isLatest?700:400}">${p.month}${isLatest?' <span style="font-size:9px;color:var(--ac);font-weight:700">最新</span>':''}</td>
              <td class="num">${fmtMoney(p.sales)}</td>
              <td class="num">${fmtMoney(p.grossProfit)}</td>
              <td class="num" style="color:${+gm>=30?'#10d9a0':+gm>=25?'#f5a623':'#f54e6e'}">${gm}%</td>
              <td class="num">${fmtMoney(p.opProfit)}</td>
              <td class="num" style="color:${+om>=8?'#10d9a0':+om>=5?'#f5a623':'#f54e6e'}">${om}%</td>
              <td class="num">${fmtMoney(p.laborCost)}</td>
              <td class="num" style="color:${+lr<=20?'#10d9a0':+lr<=25?'#f5a623':'#f54e6e'}">${lr}%</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
  </div>

  <!-- ━━ 売上バーグラフ ━━ -->
  <div class="panel" style="margin-bottom:14px">
    <div class="panel-head">
      <div class="panel-title">月次売上 + 利益 ビジュアル</div>
    </div>
    <div class="panel-body">
      <div style="display:flex;align-items:flex-end;gap:10px;height:120px;padding:0 4px">
        ${pl.map(p=>{
          const h=Math.round(p.sales/maxSales*100);
          const gh=Math.round(p.grossProfit/maxSales*100);
          const oh=Math.round(p.opProfit/maxSales*100);
          return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px">
            <div style="font-size:9px;color:var(--tx2)">${fmtMoney(p.sales)}</div>
            <div style="width:100%;position:relative;height:${h}px;background:rgba(249,115,22,.2);border-radius:4px 4px 0 0;overflow:hidden">
              <div style="position:absolute;bottom:0;width:100%;height:${gh}px;background:rgba(16,217,160,.35)"></div>
              <div style="position:absolute;bottom:0;width:100%;height:${oh}px;background:rgba(16,217,160,.7)"></div>
            </div>
            <div style="font-size:10px;color:var(--tx2);font-weight:600">${p.month}</div>
          </div>`;
        }).join('')}
      </div>
      <div style="display:flex;gap:16px;justify-content:center;margin-top:10px;font-size:10px;color:var(--tx2)">
        <span><span style="display:inline-block;width:10px;height:10px;background:rgba(249,115,22,.2);border-radius:2px;margin-right:4px"></span>売上高</span>
        <span><span style="display:inline-block;width:10px;height:10px;background:rgba(16,217,160,.35);border-radius:2px;margin-right:4px"></span>粗利益</span>
        <span><span style="display:inline-block;width:10px;height:10px;background:rgba(16,217,160,.7);border-radius:2px;margin-right:4px"></span>営業利益</span>
      </div>
    </div>
  </div>

  <!-- ━━ 社員別 給与コスト vs 売上貢献 ━━ -->
  <div class="panel" style="margin-bottom:14px">
    <div class="panel-head">
      <div class="panel-title">社員別 給与コスト vs 売上貢献</div>
      <span class="panel-sub" style="color:${connected?'#10d9a0':'#f5a623'}">${connected?'MF給与 実データ':'モックデータ（参考値）'}</span>
    </div>
    <div class="panel-body" style="padding:0;overflow-x:auto">
      <table class="tbl">
        <thead><tr>
          <th>社員</th>
          <th style="text-align:right">月給与</th>
          <th style="text-align:right">月売上貢献</th>
          <th style="text-align:right">人件費率</th>
          <th style="text-align:right">売上/給与倍率</th>
          <th style="text-align:center">評価</th>
        </tr></thead>
        <tbody>
          ${[...ps].sort((a,b)=>a.salary/a.sales-b.salary/b.sales).map(p=>{
            const lcr=(p.salary/p.sales*100).toFixed(1);
            const mult=(p.sales/p.salary).toFixed(1);
            const lcrCol=+lcr<=6?'#10d9a0':+lcr<=10?'#f5a623':'#f54e6e';
            const rank=+lcr<=6?'◎ 高貢献':+lcr<=10?'○ 標準':'△ 要改善';
            const rankCol=+lcr<=6?'#10d9a0':+lcr<=10?'#f5a623':'#f54e6e';
            return `<tr>
              <td><div style="display:flex;align-items:center;gap:7px">
                <div class="av av-sm" style="background:${p.color}">${p.avatar}</div>
                <span style="font-weight:600">${p.name}</span>
              </div></td>
              <td class="num">¥${(p.salary/10000).toFixed(1)}万</td>
              <td class="num">¥${(p.sales/10000).toFixed(0)}万</td>
              <td class="num" style="color:${lcrCol}">${lcr}%</td>
              <td class="num" style="color:${lcrCol};font-weight:700">${mult}倍</td>
              <td style="text-align:center;color:${rankCol};font-weight:700;font-size:11px">${rank}</td>
            </tr>`;
          }).join('')}
          <tr style="background:rgba(249,115,22,.05);font-weight:700">
            <td>チーム合計</td>
            <td class="num">¥${(totalSalary/10000).toFixed(1)}万</td>
            <td class="num">¥${(totalSales/10000).toFixed(0)}万</td>
            <td class="num" style="color:${+teamLCR<=8?'#10d9a0':+teamLCR<=12?'#f5a623':'#f54e6e'}">${teamLCR}%</td>
            <td class="num">${(totalSales/totalSalary).toFixed(1)}倍</td>
            <td></td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- ━━ 損益シミュレーション ━━ -->
  <div class="panel">
    <div class="panel-head">
      <div class="panel-title">💡 損益シミュレーション（来月目標）</div>
    </div>
    <div class="panel-body">
      <div class="g3" style="margin-bottom:12px">
        ${[
          {label:'目標売上 +10%',sales:Math.round(latest.sales*1.10),note:'達成すると営業利益率 +1.5pt想定'},
          {label:'粗利率 +1pt',  sales:latest.sales,note:`粗利 ${fmtMoney(Math.round(latest.sales*(+grossMargin/100+0.01)))} → 営業利益+${fmtMoney(Math.round(latest.sales*0.01))}`},
          {label:'人件費 -5%',   sales:latest.sales,note:`節約額 ${fmtMoney(Math.round(latest.laborCost*0.05))} → 営業利益率 +${(latest.laborCost*0.05/latest.sales*100).toFixed(1)}pt`},
        ].map(s=>`<div class="kpi" style="border:1px solid rgba(249,115,22,.2)">
          <div class="kpi-l" style="color:var(--ac)">${s.label}</div>
          <div class="kpi-v sm">${fmtMoney(s.sales)}</div>
          <div class="kpi-sub">${s.note}</div>
        </div>`).join('')}
      </div>
    </div>
  </div>`;
}

function renderStoreWork(){
  const s=MOCK_STORE;
  const sr=(s.sales/s.salesTarget*100).toFixed(1);
  return pageHd('店舗販売 業務状況','今村 淳子 · 酒井 さやか')+`
  <div class="g3">
    <div class="kpi accent"><div class="kpi-l">売上達成率</div><div class="kpi-v ${+sr>=100?'gold':'warn'}">${sr}%</div><div class="kpi-sub">${fmtMoney(s.sales)} ／ 目標 ${fmtMoney(s.salesTarget)}</div></div>
    <div class="kpi"><div class="kpi-l">廃棄率</div><div class="kpi-v sm ok">${(s.waste/s.sales*100).toFixed(2)}%</div><div class="kpi-sub">目標 2%以下</div></div>
    <div class="kpi"><div class="kpi-l">在庫差異率</div><div class="kpi-v sm warn">${(s.inventoryDiff/s.inventory*100).toFixed(2)}%</div><div class="kpi-sub">差異額 ${fmtMoney(s.inventoryDiff)}</div></div>
  </div>`;
}

// ─── ページ読み込み時：MF OAuthコールバック処理 ───
(async function(){
  if(window.location.search.includes('code=')){
    const ok=await handleMFCallback();
    if(ok){
      updateMFBtn();
      // ログイン後も連携済みを認識できるよう目立つ通知
      setTimeout(()=>toast('✅ MF連携完了！社長でログインして財務分析をご確認ください。','success',15000),500);
    }
  }
})();
</script>
</body>
</html>
