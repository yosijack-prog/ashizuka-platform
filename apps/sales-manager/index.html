<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sales Manager – 営業・社員管理</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hiragino Sans','Yu Gothic',sans-serif;background:#fff7ed;color:#1e293b;min-height:100vh;display:flex;flex-direction:column}
header{background:#c2410c;color:#fff;padding:16px 24px;display:flex;align-items:center;gap:16px}
.back{color:#fed7aa;font-size:13px;text-decoration:none;margin-right:8px}.back:hover{color:#fff}
h1{font-size:20px;font-weight:700}.subtitle{font-size:12px;color:#fed7aa;margin-top:2px}
.tabs-nav{background:#fff;border-bottom:1px solid #fed7aa;display:flex;padding:0 24px}
.nav-tab{padding:14px 20px;font-size:14px;font-weight:600;color:#94a3b8;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s}
.nav-tab.active{color:#ea580c;border-bottom-color:#ea580c}
main{flex:1;max-width:1100px;width:100%;margin:0 auto;padding:24px}
.api-err{background:#fee2e2;color:#991b1b;padding:12px 16px;border-radius:8px;margin-bottom:16px;font-size:14px;display:none}
/* 社員カード */
.emp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px}
.emp-card{background:#fff;border-radius:14px;padding:20px;border:1.5px solid #fed7aa;transition:all .2s}
.emp-card:hover{border-color:#ea580c;box-shadow:0 6px 20px rgba(234,88,12,.1)}
.emp-header{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.emp-avatar{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:#fff;flex-shrink:0}
.emp-name{font-size:17px;font-weight:700}
.emp-role{font-size:12px;color:#94a3b8;margin-top:2px}
.emp-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.emp-stat{background:#fff7ed;border-radius:8px;padding:10px;text-align:center}
.emp-stat-num{font-size:20px;font-weight:800;color:#ea580c}
.emp-stat-label{font-size:11px;color:#64748b;margin-top:2px}
/* 発注サマリー */
.order-table{width:100%;border-collapse:collapse;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06)}
th{background:#fff7ed;padding:12px 16px;text-align:left;font-size:13px;color:#92400e;font-weight:700;border-bottom:1px solid #fed7aa}
td{padding:12px 16px;font-size:14px;border-bottom:1px solid #fef3c7}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fff7ed}
.score-bar{width:100%;height:8px;background:#fee2e2;border-radius:4px;overflow:hidden}
.score-fill{height:100%;background:linear-gradient(90deg,#f97316,#ea580c);border-radius:4px}
.score-num{font-size:13px;font-weight:700;color:#ea580c}
/* 四半期評価 */
.eval-card{background:#fff;border-radius:14px;padding:20px;border:1.5px solid #fed7aa;margin-bottom:16px}
.eval-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.eval-emp{font-size:17px;font-weight:700}
.eval-quarter{font-size:13px;color:#94a3b8}
.eval-total{font-size:28px;font-weight:800;color:#ea580c}
.eval-row{display:flex;align-items:center;gap:12px;margin-bottom:10px;font-size:14px}
.eval-label{width:120px;color:#64748b;flex-shrink:0}
.eval-bar-wrap{flex:1}
.badge{display:inline-block;padding:3px 10px;border-radius:999px;font-size:12px;font-weight:600}
.role-driver{background:#dbeafe;color:#1e40af}
.role-sales{background:#dcfce7;color:#14532d}
.role-warehouse{background:#fef3c7;color:#92400e}
.role-manager{background:#fce7f3;color:#9d174d}
.toolbar{display:flex;gap:12px;margin-bottom:20px;align-items:center}
.toolbar select{padding:8px 12px;border:1px solid #fed7aa;border-radius:8px;font-size:14px;background:#fff}
.quarter-sel{padding:8px 12px;border:1px solid #fed7aa;border-radius:8px;font-size:14px;background:#fff}
.section{display:none}.section.active{display:block}
/* ランキング */
.ranking-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.ranking-title{font-size:18px;font-weight:800;color:#1e293b}
.ranking-period{font-size:13px;color:#94a3b8}
.ranking-list{display:flex;flex-direction:column;gap:10px}
.rank-card{background:#fff;border-radius:14px;padding:16px 20px;border:1.5px solid #fed7aa;display:flex;align-items:center;gap:14px;transition:all .2s}
.rank-card:hover{border-color:#ea580c;box-shadow:0 4px 16px rgba(234,88,12,.1)}
.rank-medal{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;flex-shrink:0}
.rank-1{background:linear-gradient(135deg,#fbbf24,#f59e0b);color:#fff}
.rank-2{background:linear-gradient(135deg,#94a3b8,#64748b);color:#fff}
.rank-3{background:linear-gradient(135deg,#d97706,#b45309);color:#fff}
.rank-other{background:#fff7ed;color:#c2410c;font-size:14px}
.rank-avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:700;color:#fff;flex-shrink:0}
.rank-info{flex:1;min-width:0}
.rank-name{font-size:15px;font-weight:700;color:#1e293b}
.rank-role{font-size:11px;color:#94a3b8;margin-top:1px}
.rank-score-wrap{text-align:right;flex-shrink:0}
.rank-score{font-size:26px;font-weight:900;color:#ea580c;line-height:1}
.rank-score-label{font-size:10px;color:#94a3b8;margin-top:2px}
.rank-bar-wrap{margin-top:8px}
.rank-bar{height:6px;background:#fef3c7;border-radius:3px;overflow:hidden}
.rank-fill{height:100%;border-radius:3px;transition:width .6s ease}
.rank-detail{display:flex;gap:12px;margin-top:6px}
.rank-detail-item{font-size:11px;color:#64748b;display:flex;align-items:center;gap:3px}
.bonus-badge{display:inline-block;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:700;background:#dcfce7;color:#16a34a;margin-left:6px}
.rank-card.rank-top{border-color:#f59e0b;background:linear-gradient(135deg,#fffbeb,#fff)}
.summary-bar{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px}
.summary-item{background:#fff;border-radius:12px;padding:14px;border:1px solid #fed7aa;text-align:center}
.summary-num{font-size:22px;font-weight:800;color:#ea580c}
.summary-label{font-size:11px;color:#64748b;margin-top:3px}
</style>
</head>
<body>
<header>
  <a class="back" href="http://localhost:5172">← ポータル</a>
  <div><h1>📊 Sales Manager</h1><div class="subtitle">営業・社員管理システム</div></div>
</header>

<div class="tabs-nav">
  <div class="nav-tab active" onclick="switchTab(this,'ranking')">🏆 今月のランキング</div>
  <div class="nav-tab" onclick="switchTab(this,'employees')">👥 社員一覧</div>
  <div class="nav-tab" onclick="switchTab(this,'orders')">📋 発注サマリー</div>
  <div class="nav-tab" onclick="switchTab(this,'evaluations')">⭐ 四半期評価</div>
</div>

<main>
  <div class="api-err" id="api-err">⚠️ APIサーバー（localhost:3001）に接続できません。バックエンドを起動してください。</div>

  <!-- ランキング -->
  <div class="section active" id="sec-ranking">
    <div id="ranking-content"></div>
  </div>

  <!-- 社員一覧 -->
  <div class="section" id="sec-employees">
    <div class="emp-grid" id="emp-grid"><div style="color:#94a3b8;padding:32px">読み込み中...</div></div>
  </div>

  <!-- 発注サマリー -->
  <div class="section" id="sec-orders">
    <div class="toolbar">
      <select id="ord-emp" onchange="loadOrders()"><option value="">全社員</option></select>
      <select id="ord-period" onchange="loadOrders()">
        <option value="">全期間</option>
        <option value="2026-01-01,2026-03-31">2026年Q1</option>
        <option value="2026-04-01,2026-06-30">2026年Q2</option>
        <option value="2025-10-01,2025-12-31">2025年Q4</option>
      </select>
    </div>
    <table class="order-table">
      <thead><tr><th>発注日</th><th>顧客</th><th>担当</th><th>金額</th><th>粗利率</th><th>ソース</th></tr></thead>
      <tbody id="ord-tbody"><tr><td colspan="6" style="text-align:center;color:#94a3b8;padding:32px">データを取得中...</td></tr></tbody>
    </table>
  </div>

  <!-- 四半期評価 -->
  <div class="section" id="sec-evaluations">
    <div class="toolbar">
      <select id="eval-quarter" class="quarter-sel" onchange="loadEvals()">
        <option value="2026-Q1" selected>2026年Q1</option>
        <option value="2026-Q2">2026年Q2</option>
        <option value="2025-Q4">2025年Q4</option>
      </select>
    </div>
    <div id="eval-list"><div style="color:#94a3b8;padding:32px;text-align:center">四半期評価データがありません</div></div>
  </div>
</main>

<script>
const API = 'http://localhost:3001';
const ROLE_LABELS = {driver:'配送',sales:'営業',warehouse:'倉庫',manager:'管理職'};
const ROLE_CLASS = {driver:'role-driver',sales:'role-sales',warehouse:'role-warehouse',manager:'role-manager'};
const SOURCE_LABELS = {smart_unit:'SmartUnit',customer_order:'顧客注文',manual:'手動'};
let employees = [];

async function init() {
  // ランキングは常に表示（モックフォールバックあり）
  loadRanking();
  try {
    const res = await fetch(`${API}/api/employees`);
    employees = (await res.json()).data || [];
    document.getElementById('api-err').style.display = 'none';
    renderEmployees();
    populateEmpSelects();
    loadOrders();
    loadEvals();
    loadRanking(); // API接続成功時に再描画
  } catch {
    document.getElementById('api-err').style.display = '';
    // モックの社員データでフォールバック
    employees = MOCK_EVALS['2026-Q1'].map(e => ({ id:e.id, name:e.name, color:e.color, avatar:e.avatar, role: e.role==='配送'?'driver':e.role==='営業'?'sales':e.role==='管理職'?'manager':'driver' }));
    renderEmployees();
    populateEmpSelects();
    loadEvals();
  }
}

function renderEmployees() {
  const grid = document.getElementById('emp-grid');
  if (!employees.length) { grid.innerHTML = '<div style="color:#94a3b8;padding:32px">社員データがありません</div>'; return; }
  grid.innerHTML = employees.map(e => `
    <div class="emp-card">
      <div class="emp-header">
        <div class="emp-avatar" style="background:${e.color||'#ea580c'}">${e.avatar||e.name[0]}</div>
        <div>
          <div class="emp-name">${e.name}</div>
          <span class="badge ${ROLE_CLASS[e.role]||''}">${ROLE_LABELS[e.role]||e.role}</span>
        </div>
      </div>
      <div class="emp-stats">
        <div class="emp-stat"><div class="emp-stat-num">-</div><div class="emp-stat-label">発注件数</div></div>
        <div class="emp-stat"><div class="emp-stat-num">-</div><div class="emp-stat-label">担当顧客</div></div>
      </div>
    </div>
  `).join('');
}

function populateEmpSelects() {
  const sel = document.getElementById('ord-emp');
  employees.forEach(e => {
    const o = document.createElement('option');
    o.value = e.id; o.textContent = e.name;
    sel.appendChild(o);
  });
}

async function loadOrders() {
  const empId = document.getElementById('ord-emp').value;
  const period = document.getElementById('ord-period').value;
  const params = new URLSearchParams();
  if (empId) params.set('employeeId', empId);
  if (period) { const [from,to] = period.split(','); params.set('from',from); params.set('to',to); }
  const tbody = document.getElementById('ord-tbody');
  try {
    const res = await fetch(`${API}/api/orders?${params}`);
    const orders = (await res.json()).data || [];
    if (!orders.length) { tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:#94a3b8;padding:24px">発注データがありません</td></tr>'; return; }
    tbody.innerHTML = orders.map(o => {
      const emp = employees.find(e => e.id === o.employeeId);
      return `<tr>
        <td>${(o.orderDate||'').slice(0,10)}</td>
        <td>${o.customerName}</td>
        <td>${emp ? emp.name : o.employeeId}</td>
        <td>¥${(o.totalAmount||0).toLocaleString()}</td>
        <td>
          <div style="display:flex;align-items:center;gap:8px">
            <div class="score-bar" style="width:80px"><div class="score-fill" style="width:${((o.totalGrossMargin||0)*100).toFixed(0)}%"></div></div>
            <span class="score-num">${((o.totalGrossMargin||0)*100).toFixed(1)}%</span>
          </div>
        </td>
        <td><span class="badge" style="background:#fff7ed;color:#c2410c">${SOURCE_LABELS[o.source]||o.source}</span></td>
      </tr>`;
    }).join('');
  } catch { tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:#991b1b;padding:24px">データ取得に失敗</td></tr>'; }
}

function renderEvals(evals, qk) {
  const el = document.getElementById('eval-list');
  if (!evals.length) { el.innerHTML = '<div style="color:#94a3b8;padding:32px;text-align:center">この四半期の評価データがありません</div>'; return; }
  el.innerHTML = evals.map(ev => {
    const name        = ev.employeeName || ev.name;
    const total       = ev.totalScore   ?? ev.total ?? 0;
    const newScore    = ev.newProductScore   ?? 0;
    const newCount    = ev.newProductCount   ?? 0;
    const newTarget   = ev.newProductTarget  ?? 0;
    const marginScore = ev.marginScore  ?? 0;
    const margin      = ev.avgGrossMargin ?? 0;
    const marginTgt   = ev.marginTarget  ?? 0;
    const settScore   = ev.settlementScore ?? ev.settlementScore ?? 0;
    const settRate    = ev.settlementRate  ?? 0;
    const settTgt     = ev.settlementTarget ?? 0;
    const prev        = ev.prevQuarterScore ?? ev.prevScore ?? 0;
    const diff        = total - prev;
    const diffStr     = diff >= 0 ? `+${diff.toFixed(0)}` : diff.toFixed(0);
    const diffColor   = diff >= 0 ? '#22c55e' : '#ef4444';
    const emp         = employees.find(e => e.id === (ev.employeeId || ev.id));
    const color       = emp?.color || ev.color || '#94a3b8';
    const avatar      = emp?.avatar || ev.avatar || name[0];
    const bonus       = bonusLabel(total);
    const totalColor  = total >= 100 ? '#f59e0b' : '#ea580c';
    return `
    <div class="eval-card">
      <div class="eval-header">
        <div style="display:flex;align-items:center;gap:12px">
          <div style="width:40px;height:40px;border-radius:50%;background:${color};display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:700;color:#fff;flex-shrink:0">${avatar}</div>
          <div>
            <div class="eval-emp">${name}</div>
            <div class="eval-quarter">${qk} &nbsp;<span class="bonus-badge">${bonus}</span></div>
          </div>
        </div>
        <div style="text-align:right">
          <div style="font-size:11px;color:#94a3b8;margin-bottom:2px">総合スコア <span style="font-size:10px">（100=目標）</span></div>
          <div class="eval-total" style="color:${totalColor}">${total.toFixed(0)}</div>
          <div style="font-size:12px;font-weight:700;color:${diffColor}">${diffStr} 前期比</div>
        </div>
      </div>
      <div class="eval-row">
        <span class="eval-label">🆕 新商品開拓 (33%)</span>
        <div class="eval-bar-wrap">${scoreBar(newScore)}</div>
        <span class="score-num" style="width:36px;text-align:right;color:${newScore>=100?'#f59e0b':'#ea580c'}">${newScore.toFixed(0)}</span>
      </div>
      <div style="font-size:11px;color:#94a3b8;margin:-6px 0 10px 122px">${newCount}件 ／ 目標 ${newTarget}件</div>
      <div class="eval-row">
        <span class="eval-label">💴 販売利益率 (33%)</span>
        <div class="eval-bar-wrap">${scoreBar(marginScore)}</div>
        <span class="score-num" style="width:36px;text-align:right;color:${marginScore>=100?'#f59e0b':'#ea580c'}">${marginScore.toFixed(0)}</span>
      </div>
      <div style="font-size:11px;color:#94a3b8;margin:-6px 0 10px 122px">${margin}% ／ 目標 ${marginTgt}%</div>
      <div class="eval-row">
        <span class="eval-label">📌 定着率 (34%)</span>
        <div class="eval-bar-wrap">${scoreBar(settScore)}</div>
        <span class="score-num" style="width:36px;text-align:right;color:${settScore>=100?'#f59e0b':'#ea580c'}">${settScore.toFixed(0)}</span>
      </div>
      <div style="font-size:11px;color:#94a3b8;margin:-6px 0 0 122px">${settRate}% ／ 目標 ${settTgt}%</div>
    </div>`;
  }).join('');
}

async function loadEvals() {
  const qk = document.getElementById('eval-quarter').value;
  try {
    const res = await fetch(`${API}/api/evaluations?quarterKey=${qk}`);
    const evals = (await res.json()).data || [];
    if (evals.length) { renderEvals(evals, qk); return; }
  } catch {}
  // フォールバック：モックデータ
  renderEvals(MOCK_EVALS[qk] || [], qk);
}

// ---- モックデータ（API未接続時のフォールバック） ----
// スコア = 実績 ÷ 目標 × 100（100=達成、100超=超過達成）
const MOCK_EVALS = {
  '2026-Q1': [
    { id:'emp_tan', name:'谷口 亮介',   role:'配送', color:'#3b82f6', avatar:'谷', total:118, newProductCount:9,  newProductTarget:7,  newProductScore:129, avgGrossMargin:32, marginTarget:28, marginScore:114, settlementRate:78, settlementTarget:70, settlementScore:111, prevScore:110 },
    { id:'emp_oku', name:'奥田 玲晃',   role:'配送', color:'#22c55e', avatar:'奥', total:103, newProductCount:7,  newProductTarget:7,  newProductScore:100, avgGrossMargin:30, marginTarget:28, marginScore:107, settlementRate:71, settlementTarget:70, settlementScore:101, prevScore:95  },
    { id:'emp_abi', name:'阿比留 徹',   role:'配送', color:'#f59e0b', avatar:'阿', total:99,  newProductCount:6,  newProductTarget:7,  newProductScore:86,  avgGrossMargin:29, marginTarget:28, marginScore:104, settlementRate:75, settlementTarget:70, settlementScore:107, prevScore:92  },
    { id:'emp_aka', name:'赤川 秀敏',   role:'配送', color:'#ef4444', avatar:'赤', total:80,  newProductCount:4,  newProductTarget:7,  newProductScore:57,  avgGrossMargin:27, marginTarget:28, marginScore:96,  settlementRate:60, settlementTarget:70, settlementScore:86,  prevScore:75  },
    { id:'emp_ima', name:'今村 淳子',   role:'配送', color:'#a855f7', avatar:'今', total:74,  newProductCount:3,  newProductTarget:6,  newProductScore:50,  avgGrossMargin:26, marginTarget:28, marginScore:93,  settlementRate:55, settlementTarget:70, settlementScore:79,  prevScore:70  },
    { id:'emp_kaw', name:'川原 未香',   role:'配送', color:'#ec4899', avatar:'川', total:64,  newProductCount:2,  newProductTarget:6,  newProductScore:33,  avgGrossMargin:25, marginTarget:28, marginScore:89,  settlementRate:50, settlementTarget:70, settlementScore:71,  prevScore:60  },
    { id:'emp_ash', name:'芦塚 義幸',   role:'管理職',color:'#06b6d4', avatar:'芦', total:61,  newProductCount:2,  newProductTarget:6,  newProductScore:33,  avgGrossMargin:24, marginTarget:28, marginScore:86,  settlementRate:45, settlementTarget:70, settlementScore:64,  prevScore:55  },
    { id:'emp_sak', name:'酒井 さやか', role:'営業', color:'#84cc16', avatar:'酒', total:53,  newProductCount:1,  newProductTarget:5,  newProductScore:20,  avgGrossMargin:23, marginTarget:28, marginScore:82,  settlementRate:40, settlementTarget:70, settlementScore:57,  prevScore:50  },
  ],
};

// 賞与倍率: 100=達成(×1.10)、120超=大幅超過(×1.30)
function bonusLabel(score) {
  if (score >= 120) return '×1.30';
  if (score >= 110) return '×1.20';
  if (score >= 100) return '×1.10';
  if (score >= 85)  return '×1.05';
  return '×1.00';
}

// スコアバー（100点に基準線、超過分は金色）
const BAR_MAX = 130;
function scoreBar(score) {
  const pct      = Math.min(score, BAR_MAX) / BAR_MAX * 100;
  const markPct  = (100 / BAR_MAX * 100).toFixed(1);
  const isOver   = score >= 100;
  const fill     = isOver
    ? 'linear-gradient(90deg,#f97316,#fbbf24)'
    : 'linear-gradient(90deg,#f97316,#ea580c)';
  return `<div style="position:relative;height:8px;background:#fef3c7;border-radius:4px;overflow:visible;flex:1">
    <div style="height:100%;width:${pct.toFixed(1)}%;background:${fill};border-radius:4px;transition:width .6s ease;max-width:100%"></div>
    <div style="position:absolute;top:-3px;left:${markPct}%;width:2px;height:14px;background:#475569;border-radius:1px" title="目標100点"></div>
  </div>`;
}

const MOCK_RANKING = MOCK_EVALS['2026-Q1']
  .slice().sort((a,b)=>b.total-a.total)
  .map((e,i)=>({
    rank:i+1, id:e.id, name:e.name, role:e.role, color:e.color, avatar:e.avatar,
    score:e.total, newProduct:e.newProductCount, margin:e.avgGrossMargin, settle:e.settlementRate,
    bonus: bonusLabel(e.total),
  }));

function renderRanking(data) {
  const top = data[0];
  const avg = Math.round(data.reduce((s,e)=>s+e.score,0)/data.length);
  const container = document.getElementById('ranking-content');
  const now = new Date();
  const period = `${now.getFullYear()}年${now.getMonth()+1}月`;
  container.innerHTML = `
    <div class="ranking-header">
      <div class="ranking-title">🏆 今月のランキング</div>
      <div class="ranking-period">${period} 集計</div>
    </div>
    <div class="summary-bar">
      <div class="summary-item"><div class="summary-num">${data.length}</div><div class="summary-label">評価対象</div></div>
      <div class="summary-item"><div class="summary-num">${top.score}</div><div class="summary-label">最高スコア</div></div>
      <div class="summary-item"><div class="summary-num">${avg}</div><div class="summary-label">チーム平均</div></div>
    </div>
    <div class="ranking-list">
      ${data.map(e => {
        const medalClass = e.rank===1?'rank-1':e.rank===2?'rank-2':e.rank===3?'rank-3':'rank-other';
        const medalText  = e.rank===1?'🥇':e.rank===2?'🥈':e.rank===3?'🥉':e.rank;
        const fillPct    = Math.min(Math.round(e.score / BAR_MAX * 100), 100);
        const fillColor  = e.score>=100?'linear-gradient(90deg,#f59e0b,#fbbf24)':e.rank<=3?'linear-gradient(90deg,#ea580c,#f97316)':'linear-gradient(90deg,#94a3b8,#cbd5e1)';
        const cardClass  = e.rank===1?' rank-top':'';
        return `
        <div class="rank-card${cardClass}">
          <div class="rank-medal ${medalClass}">${medalText}</div>
          <div class="rank-avatar" style="background:${e.color}">${e.avatar}</div>
          <div class="rank-info">
            <div class="rank-name">${e.name}<span class="bonus-badge">${e.bonus}</span></div>
            <div class="rank-role">${e.role}</div>
            <div class="rank-bar-wrap">
              <div class="rank-bar"><div class="rank-fill" style="width:${fillPct}%;background:${fillColor}"></div></div>
            </div>
            <div class="rank-detail">
              <span class="rank-detail-item">🆕 新商品 ${e.newProduct}件</span>
              <span class="rank-detail-item">💴 粗利率 ${e.margin}%</span>
              <span class="rank-detail-item">📌 定着率 ${e.settle}%</span>
            </div>
          </div>
          <div class="rank-score-wrap">
            <div class="rank-score">${e.score}</div>
            <div class="rank-score-label">点</div>
          </div>
        </div>`;
      }).join('')}
    </div>`;
}

async function loadRanking() {
  try {
    const res = await fetch(`${API}/api/evaluations?quarterKey=2026-Q1`);
    const evals = (await res.json()).data || [];
    if (evals.length) {
      const data = evals
        .sort((a,b)=>b.totalScore-a.totalScore)
        .map((e,i)=>({
          rank: i+1, id: e.employeeId, name: e.employeeName,
          role: '配送', color: '#64748b', avatar: e.employeeName[0],
          score: Math.round(e.totalScore),
          newProduct: e.newProductCount, margin: Math.round(e.avgGrossMargin),
          settle: Math.round(e.settlementRate),
          bonus: bonusLabel(Math.round(e.totalScore)),
        }));
      // アバター・カラーを社員データで補完
      data.forEach(d => {
        const emp = employees.find(e=>e.id===d.id);
        if (emp) { d.color=emp.color; d.avatar=emp.avatar; d.role=emp.role==='driver'?'配送':emp.role==='manager'?'管理職':emp.role==='sales'?'営業':'倉庫'; }
      });
      renderRanking(data);
      return;
    }
  } catch {}
  // フォールバック：モックデータ
  renderRanking(MOCK_RANKING);
}

function switchTab(el, section) {
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById(`sec-${section}`).classList.add('active');
}

init();
</script>
